function loadStore() {
  try { const s = localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return defaultStore();
}
function saveStore(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e){} }

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt = (n,dec=0) => '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
const fmtSigned = (n,dec=0) => (n<0?'−':'')+fmt(n,dec);
function compProg(groups=[]) {
  let done=0,total=0;
  groups.forEach(g=>g.items.forEach(it=>{total++;if(it.done)done++;}));
  return {done,total,pct:total===0?0:Math.round(done/total*100)};
}
function grpProg(g) { const d=g.items.filter(i=>i.done).length; return {done:d,total:g.items.length}; }

// ── PRIMITIVES ───────────────────────────────────────────────────────────────
const Card = ({children,padding=24,style,accent}) => (
  <div style={{background:'var(--surface-1)',border:'1px solid var(--line-1)',borderRadius:'var(--r-2)',padding,
    borderLeft:accent?`3px solid ${accent}`:undefined,...style}}>{children}</div>
);
const Dia = ({color='currentColor',filled=true,size=8,style}) => (
  <span style={{display:'inline-block',width:size,height:size,
    background:filled?color:'transparent',border:filled?'none':`1.5px solid ${color}`,
    transform:'rotate(45deg)',flexShrink:0,...style}}/>
);
const Eyebrow = ({children,style}) => (
  <div style={{fontFamily:'Geist,sans-serif',fontSize:11,fontWeight:500,letterSpacing:'0.08em',
    textTransform:'uppercase',color:'var(--fg-3)',...style}}>{children}</div>
);
const Badge = ({children,tone='neutral',subtle,style}) => {
  const T={safe:{bg:'var(--safe-tint)',fg:'var(--safe-500)'},out:{bg:'var(--out-tint)',fg:'var(--out-500)'},
    play:{bg:'var(--play-tint)',fg:'var(--play-500)'},info:{bg:'var(--info-tint)',fg:'var(--info-500)'},
    neutral:{bg:'var(--surface-2)',fg:'var(--fg-2)'},brand:{bg:'var(--brand-faint)',fg:'var(--teal-300)'},
    ghost:{bg:'transparent',fg:'var(--fg-3)'}};
  const t=T[tone]||T.neutral;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,
    background:subtle?'transparent':t.bg,color:t.fg,
    border:subtle?`1px solid ${t.fg}33`:'none',
    fontFamily:'Geist,sans-serif',fontSize:11,fontWeight:500,
    padding:'3px 9px',borderRadius:'var(--r-pill)',letterSpacing:0.2,whiteSpace:'nowrap',...style}}>{children}</span>;
};
const Btn = ({children,variant='secondary',onClick,style,icon,iconRight,size='md',type}) => {
  const V={primary:{background:'var(--brand)',color:'var(--on-brand)',border:'1px solid var(--brand)'},
    accent:{background:'var(--accent)',color:'var(--on-accent)',border:'1px solid var(--accent)'},
    secondary:{background:'var(--surface-2)',color:'var(--fg-1)',border:'1px solid var(--line-2)'},
    ghost:{background:'transparent',color:'var(--fg-2)',border:'1px solid transparent'},
    outline:{background:'transparent',color:'var(--fg-1)',border:'1px solid var(--line-2)'},
    danger:{background:'var(--out-tint)',color:'var(--out-500)',border:'1px solid rgba(224,122,95,0.35)'}};
  const S={sm:{padding:'5px 10px',fontSize:12},md:{padding:'7px 12px',fontSize:13},lg:{padding:'10px 16px',fontSize:14}};
  return <button type={type||'button'} onClick={onClick} style={{
    fontFamily:'Geist,sans-serif',fontWeight:500,borderRadius:'var(--r-1)',
    display:'inline-flex',alignItems:'center',gap:7,justifyContent:'center',
    cursor:'pointer',transition:'background 120ms',...S[size],...V[variant],...style}}>
    {icon&&<i data-lucide={icon} style={{width:14,height:14}}/>}
    {children}
    {iconRight&&<i data-lucide={iconRight} style={{width:14,height:14}}/>}
  </button>;
};
const Metric = ({label,value,tone,sub,mono=true,first}) => (
  <div style={{padding:'16px 22px',borderLeft:first?'none':'1px solid var(--line-1)',minWidth:0,flex:1}}>
    <Eyebrow>{label}</Eyebrow>
    <div className={mono?'mono':''} style={{fontSize:24,fontWeight:500,marginTop:8,
      color:tone?`var(--${tone}-500)`:'var(--fg-1)',letterSpacing:'-0.01em',lineHeight:1.05}}>{value}</div>
    {sub&&<div style={{fontSize:11,marginTop:5,color:'var(--fg-3)'}}>{sub}</div>}
  </div>
);
const MetricStrip = ({items}) => (
  <Card padding={0} style={{overflow:'hidden'}}>
    <div style={{display:'flex'}}>{items.map((it,i)=><Metric key={i} {...it} first={i===0}/>)}</div>
  </Card>
);
const AItem = ({tier='info',icon,title,detail,action,meta,onAction}) => {
  const C={critical:{border:'var(--out-500)',ic:'var(--out-500)',bg:'rgba(224,122,95,0.06)'},
    warning:{border:'var(--play-500)',ic:'var(--play-500)',bg:'rgba(217,178,111,0.05)'},
    info:{border:'var(--teal-500)',ic:'var(--teal-300)',bg:'rgba(42,139,130,0.06)'}};
  const c=C[tier];
  return <div style={{display:'grid',gridTemplateColumns:'22px 1fr auto',gap:14,alignItems:'start',
    background:c.bg,border:'1px solid var(--line-1)',borderLeft:`3px solid ${c.border}`,
    borderRadius:'var(--r-1)',padding:'12px 14px'}}>
    <i data-lucide={icon} style={{width:16,height:16,color:c.ic,marginTop:2}}/>
    <div style={{minWidth:0}}>

      <div style={{fontSize:12,color:'var(--fg-2)',marginTop:3,lineHeight:1.4}}>{detail}</div>
      {meta&&<div className="meta" style={{marginTop:6}}>{meta}</div>}
    </div>
    {action&&<button onClick={onAction} style={{background:'transparent',border:'1px solid var(--line-2)',
      color:'var(--fg-1)',cursor:'pointer',fontFamily:'Geist,sans-serif',fontWeight:500,fontSize:12,
      padding:'5px 10px',borderRadius:'var(--r-1)',whiteSpace:'nowrap'}}>{action} →</button>}
  </div>;
};

  <div style={{height,background:track,borderRadius:999,overflow:'hidden'}}>
    <div style={{width:`${total?Math.min(100,value/total*100):0}%`,height:'100%',
      background:color,borderRadius:999,transition:'width 200ms'}}/>
  </div>

  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,gap:12}}>

    {checked&&<i data-lucide="check" style={{width:12,height:12,color:'var(--on-brand)'}}/>}
  </button>
);

  if(!open)return null;

    <div onClick={e=>e.stopPropagation()} style={{background:'var(--surface-3)',border:'1px solid var(--line-2)',

const Dashboard = ({store,propertyId,navigate,onAddTenant}) => {
  const units=store.tenants.filter(u=>u.property===propertyId);
  const payments=store.payments.filter(p=>p.property===propertyId);
  const exps=store.expenses.filter(e=>e.property===propertyId);
  const alerts=ALERTS_DATA[propertyId]||[];
  const cgroups=store.compliance[propertyId]||[];
  const cp=compProg(cgroups);
  const rentRoll=units.filter(u=>u.status!=='vacant').reduce((a,u)=>a+(u.tenantShare||u.rent),0);
  const totalExp=exps.filter(e=>e.status==='paid').reduce((a,e)=>a+e.amount,0);
  const cf=rentRoll-totalExp;
  const openR=store.repairs.filter(r=>r.property===propertyId&&r.status!=='completed').length;
  const trend=[
    {m:'Dec',i:3100,e:2400},{m:'Jan',i:3100,e:2700},{m:'Feb',i:2750,e:2300},
    {m:'Mar',i:3200,e:2500},{m:'Apr',i:2850,e:2680},{m:'May',i:rentRoll,e:totalExp}
  ];
  const maxT=Math.max(...trend.flatMap(t=>[t.i,t.e]));
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>
    <MetricStrip items={[
      {label:'Rent roll',value:fmt(rentRoll),tone:'safe'},
      {label:'Expenses',value:fmt(totalExp),tone:'out'},
      {label:'Cash flow',value:fmt(cf),tone:'safe',sub:'This month'},
      {label:'Compliance',value:cp.pct+'%',tone:'play',sub:`${cp.done} of ${cp.total} complete`},
      {label:'Open repairs',value:openR,sub:openR===0?'All clear':'Needs attention'},
    ]}/>
    <div>
      <SHead title="Alerts this week" icon="bell" meta={`${alerts.length} open`}
        action={<Btn variant="ghost" size="sm" icon="sliders-horizontal">Filter</Btn>}/>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {alerts.map((a,i)=><AItem key={i} {...a}/>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:24}}>
      <Card padding={0}>
        <div style={{padding:'20px 24px 14px'}}>
          <SHead title="Financial snapshot" icon="trending-up"
            action={<Btn variant="ghost" size="sm" iconRight="arrow-right" onClick={()=>navigate('financials')}>Financials</Btn>}/>
          <div style={{display:'flex',alignItems:'baseline',gap:16,marginTop:4}}>
            <div style={{fontFamily:'Instrument Serif,serif',fontSize:52,lineHeight:1,letterSpacing:'-0.02em',color:'var(--fg-1)'}}>{fmt(cf)}</div>
            <div>
              <div style={{fontFamily:'Instrument Serif,serif',fontStyle:'italic',fontSize:20,color:'var(--fg-3)'}}>net this month</div>
              <div className="meta" style={{marginTop:2}}>{cf>0?'+':''}{Math.round((cf/(rentRoll||1))*100)}% margin</div>
            </div>
          </div>
        </div>
        <div style={{padding:'8px 24px 12px',borderTop:'1px solid var(--line-1)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'12px 0 10px'}}>
            <Eyebrow>6-month trend</Eyebrow>
            <div style={{display:'flex',gap:14,fontSize:11,color:'var(--fg-2)'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:5}}><Dia color="var(--safe-500)" size={7}/> Income</span>
              <span style={{display:'inline-flex',alignItems:'center',gap:5}}><Dia color="var(--out-500)" size={7}/> Expense</span>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:14,alignItems:'end',height:120}}>
            {trend.map((t,i)=><div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,height:'100%',justifyContent:'end'}}>
              <div style={{display:'flex',alignItems:'end',gap:3,flex:1,width:'100%',justifyContent:'center'}}>
                <div style={{width:14,height:`${t.i/maxT*100}%`,background:'var(--safe-500)',borderRadius:'2px 2px 0 0'}}/>

              </div>
              <div style={{fontSize:11,color:'var(--fg-3)'}}>{t.m}</div>
            </div>)}
          </div>
        </div>
        <div style={{padding:'14px 24px',borderTop:'1px solid var(--line-1)',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
          {[{k:'Collected',v:fmt(rentRoll),c:'var(--safe-500)'},{k:'Paid out',v:fmt(totalExp),c:'var(--out-500)'},{k:'YTD net',v:fmt(cf*5),c:'var(--fg-1)'}]
            .map((s,i)=><div key={i} style={{borderLeft:i?'1px solid var(--line-1)':'none',paddingLeft:i?14:0}}>
              <Eyebrow>{s.k}</Eyebrow>

            </div>)}
        </div>

// ── PORTFOLIO ─────────────────────────────────────────────────────────────────
const Portfolio = ({store,navigate,setCurrentProp}) => {
  const totalRent=store.properties.reduce((a,p)=>{
    return a+store.tenants.filter(u=>u.property===p.id&&u.status!=='vacant').reduce((s,u)=>s+(u.tenantShare||u.rent),0);
  },0);
  const totalCF=store.properties.reduce((a,p)=>{
    const r=store.tenants.filter(u=>u.property===p.id&&u.status!=='vacant').reduce((s,u)=>s+(u.tenantShare||u.rent),0);
    const e=store.expenses.filter(x=>x.property===p.id&&x.status==='paid').reduce((s,x)=>s+x.amount,0);
    return a+(r-e);
  },0);
  const avgComp=Math.round(store.properties.reduce((a,p)=>a+compProg(store.compliance[p.id]||[]).pct,0)/store.properties.length);
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>
    <MetricStrip items={[
      {label:'Properties',value:store.properties.length},
      {label:'Units',value:store.tenants.length,sub:`${store.tenants.filter(u=>u.status!=='vacant').length} occupied`},
      {label:'Rent roll',value:fmt(totalRent),tone:'safe'},
      {label:'Cash flow',value:fmt(totalCF),tone:'safe',sub:'May 2026'},
      {label:'Compliance',value:avgComp+'%',tone:'play',sub:'Avg across props'},
    ]}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
      {store.properties.map(p=>{
        const pu=store.tenants.filter(u=>u.property===p.id);
        const r=pu.filter(u=>u.status!=='vacant').reduce((a,u)=>a+(u.tenantShare||u.rent),0);
        const e=store.expenses.filter(x=>x.property===p.id&&x.status==='paid').reduce((a,x)=>a+x.amount,0);
        const cp=compProg(store.compliance[p.id]||[]);
        return <Card key={p.id} accent={p.dot} padding={0}>
          <div style={{padding:'18px 22px',borderBottom:'1px solid var(--line-1)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
              <h4 style={{fontSize:17,fontWeight:600,margin:0,color:'var(--fg-1)'}}>{p.name}</h4>
              <Btn variant="ghost" size="sm" iconRight="arrow-right" onClick={()=>{setCurrentProp(p.id);navigate('dashboard');}}>Open</Btn>
            </div>
            <div className="meta" style={{marginTop:4}}>{p.address}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)'}}>
            {[{k:'Units',v:`${pu.filter(u=>u.status!=='vacant').length}/${pu.length}`},{k:'Cash flow',v:fmt(r-e),tone:'safe'},{k:'Compliance',v:cp.pct+'%',tone:cp.pct<30?'play':'safe'}]
              .map((s,i)=><div key={i} style={{padding:18,borderLeft:i?'1px solid var(--line-1)':'none'}}>
                <Eyebrow>{s.k}</Eyebrow>
                <div className="mono" style={{fontSize:18,marginTop:4,color:s.tone?`var(--${s.tone}-500)`:'var(--fg-1)'}}>{s.v}</div>
              </div>)}
          </div>
        </Card>;
      })}
    </div>
  </div>;
};

// ── PAYMENTS ──────────────────────────────────────────────────────────────────
const Payments = ({store,propertyId,openRecord}) => {
  const [uFilter,setU]=useState('');
  const [sFilter,setS]=useState('');
  const all=store.payments.filter(p=>p.property===propertyId);
  const filtered=all.filter(p=>(!uFilter||p.unit===uFilter)&&(!sFilter||p.status===sFilter));
  const totals=filtered.reduce((a,p)=>{if(p.status==='paid')a.recv+=p.amount;else if(p.status==='late')a.out+=p.amount;return a;},{recv:0,out:0});
  const uNames=[...new Set(all.map(p=>p.unit))];
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>
    <MetricStrip items={[
      {label:'Received',value:fmt(totals.recv),tone:'safe',sub:`${filtered.filter(f=>f.status==='paid').length} payments`},
      {label:'Outstanding',value:fmt(totals.out),tone:totals.out?'out':null,sub:totals.out?'1 unit late':'All current'},
      {label:'Avg. method',value:'Bank transfer',mono:false,sub:'Most common'},
      {label:'HAP share',value:fmt(filtered.filter(f=>f.source==='HAP'&&f.status==='paid').reduce((a,p)=>a+p.amount,0)),tone:'play',sub:'From housing auth.'},
    ]}/>
    <div>
      <SHead title="Payments" icon="wallet-minimal" meta={`${filtered.length} of ${all.length}`}
        action={<div style={{display:'flex',gap:8}}>
          <Sel value={uFilter} onChange={setU} placeholder="All units" options={uNames.map(u=>({value:u,label:u}))} style={{width:130}}/>
          <Sel value={sFilter} onChange={setS} placeholder="All statuses" options={[{value:'paid',label:'Paid'},{value:'late',label:'Late'}]} style={{width:130}}/>
          <Btn variant="primary" icon="plus" onClick={openRecord}>Record payment</Btn>
        </div>}/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(p=><LRow key={p.id}
          primary={p.tenant} secondary={`${p.unit} · ${p.period} · ${p.method}`}
          badges={<Badge tone={p.source==='HAP'?'play':'neutral'}>{p.source}</Badge>}
          right={fmt(p.amount)}
          status={p.status==='paid'?'Paid':p.status==='late'?'Late':'Pending'}
          statusTone={p.status==='paid'?'safe':p.status==='late'?'out':'play'}
          rightSub={`· ${p.date}`}/>)}
      </div>
    </div>
  </div>;
};

// ── EXPENSES ──────────────────────────────────────────────────────────────────
const Expenses = ({store,propertyId}) => {
  const [cat,setCat]=useState('');
  const all=store.expenses.filter(e=>e.property===propertyId);
  const cats=[...new Set(all.map(e=>e.cat))];
  const filtered=all.filter(e=>!cat||e.cat===cat);
  const total=filtered.reduce((a,e)=>a+e.amount,0);
  const paid=filtered.filter(e=>e.status==='paid').reduce((a,e)=>a+e.amount,0);
  const byCat=cats.map(c=>({cat:c,total:all.filter(e=>e.cat===c).reduce((a,e)=>a+e.amount,0)})).sort((a,b)=>b.total-a.total);
  const chip=(active)=>({background:active?'var(--surface-2)':'transparent',border:`1px solid ${active?'var(--line-2)':'var(--line-1)'}`,
    color:active?'var(--fg-1)':'var(--fg-2)',padding:'6px 12px',borderRadius:'var(--r-pill)',fontSize:12,cursor:'pointer',fontFamily:'Geist,sans-serif',fontWeight:500});
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>
    <MetricStrip items={[
      {label:'Total expenses',value:fmt(total),tone:'out'},
      {label:'Paid',value:fmt(paid),sub:`${filtered.filter(e=>e.status==='paid').length} txns`},
      {label:'Pending',value:fmt(total-paid),tone:total-paid?'play':null,sub:filtered.filter(e=>e.status!=='paid').length+' txns'},
      {label:'Biggest',value:byCat[0]?.cat||'—',mono:false,sub:byCat[0]?fmt(byCat[0].total):''},
    ]}/>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      <button onClick={()=>setCat('')} style={chip(cat==='')}>All <span className="mono" style={{marginLeft:6,color:'var(--fg-3)'}}>{all.length}</span></button>
      {byCat.map(c=><button key={c.cat} onClick={()=>setCat(c.cat)} style={chip(cat===c.cat)}>
        {c.cat} <span className="mono" style={{marginLeft:6,color:'var(--fg-3)'}}>{fmt(c.total)}</span>
      </button>)}
    </div>
    <div>
      <SHead title="Expenses" icon="receipt" meta={`${filtered.length} txns`}
        action={<Btn variant="primary" icon="plus">Add expense</Btn>}/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(e=><LRow key={e.id}
          primary={e.desc} secondary={`${e.vendor} · ${e.unit} · ${e.method}`}
          badges={<Badge tone={e.cat==='Repairs'?'out':e.cat==='Utilities'?'info':e.cat==='Mortgage'?'neutral':e.cat==='Insurance'?'play':'brand'}>{e.cat}</Badge>}
          right={`−${fmt(e.amount)}`}
          status={e.status==='paid'?'Paid':'Pending'} statusTone={e.status==='paid'?'safe':'play'}
          rightSub={`· ${e.date}`}/>)}
      </div>
    </div>
  </div>;
};

// ── FINANCIALS ────────────────────────────────────────────────────────────────
const Financials = ({store,propertyId}) => {
  const pmts=store.payments.filter(p=>p.property===propertyId);

  const net=totalIn-totalOut;
  const byCat={};
  exps.forEach(e=>{if(e.status==='paid')byCat[e.cat]=(byCat[e.cat]||0)+e.amount;});
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const pL={padding:'11px 24px',fontSize:13,color:'var(--fg-2)'};
  const pA={padding:'11px 24px',fontFamily:'Geist Mono,monospace',fontSize:13,color:'var(--fg-1)',textAlign:'right'};
  return <div style={{display:'flex',flexDirection:'column',gap:24,maxWidth:880}}>
    <Card padding={28}>
      <Eyebrow>Profit & loss · 2026 YTD</Eyebrow>
      <div style={{marginTop:12,display:'flex',alignItems:'baseline',gap:14}}>
        <span style={{fontFamily:'Instrument Serif,serif',fontSize:64,lineHeight:1,color:'var(--fg-1)'}}>{fmt(net)}</span>
        <span style={{fontFamily:'Instrument Serif,serif',fontStyle:'italic',fontSize:24,color:'var(--fg-3)'}}>net</span>
      </div>
      <div className="meta" style={{marginTop:8}}>Cash basis · May 12, 2026</div>
    </Card>
    <Card padding={0}>
      <table style={{width:'100%',borderCollapse:'collapse',fontVariantNumeric:'tabular-nums'}}>
        <tbody>
          <tr style={{background:'var(--surface-0)'}}>
            <td style={{padding:'10px 24px',fontSize:11,color:'var(--fg-3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Income</td><td/>
          </tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={pL}>Rent collected</td><td style={pA}>{fmt(pmts.filter(p=>p.source==='Tenant'&&p.status==='paid').reduce((a,p)=>a+p.amount,0))}</td></tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={pL}>HAP / Section 8</td><td style={pA}>{fmt(pmts.filter(p=>p.source==='HAP'&&p.status==='paid').reduce((a,p)=>a+p.amount,0))}</td></tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={{...pL,fontWeight:500,color:'var(--fg-1)'}}>Total income</td><td style={{...pA,color:'var(--safe-500)',fontWeight:500}}>{fmt(totalIn)}</td></tr>
          <tr style={{background:'var(--surface-0)'}}><td style={{padding:'10px 24px',fontSize:11,color:'var(--fg-3)',textTransform:'uppercase',letterSpacing:'0.08em',borderTop:'1px solid var(--line-1)'}}>Expenses</td><td style={{borderTop:'1px solid var(--line-1)'}}/></tr>
          {catRows.map(([c,v])=><tr key={c} style={{borderTop:'1px solid var(--line-1)'}}><td style={pL}>{c}</td><td style={pA}>−{fmt(v)}</td></tr>)}
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={{...pL,fontWeight:500,color:'var(--fg-1)'}}>Total expenses</td><td style={{...pA,color:'var(--out-500)',fontWeight:500}}>−{fmt(totalOut)}</td></tr>
          <tr style={{borderTop:'1px solid var(--line-2)',background:'var(--surface-0)'}}>
            <td style={{...pL,fontSize:14,color:'var(--fg-1)',fontWeight:600,fontFamily:'Instrument Serif,serif',fontStyle:'italic'}}>Net cash flow</td>
            <td style={{...pA,fontSize:18,fontWeight:500,color:net>=0?'var(--safe-500)':'var(--out-500)'}}>{fmtSigned(net)}</td>
          </tr>
        </tbody>
      </table>
      <div style={{padding:16,borderTop:'1px solid var(--line-1)',display:'flex',justifyContent:'flex-end',gap:8}}>
        <Btn variant="outline" icon="download">CSV</Btn>
        <Btn variant="outline" icon="download">PDF</Btn>
      </div>
    </Card>
  </div>;
};

  const unit=units.find(u=>u.id===uid);
  useEffect(()=>{if(unit)setAmt(String(unit.tenantShare||unit.rent));},[uid]);

    dispatch({type:'ADD_PAYMENT',payment:{id:'P-'+Date.now(),tenant:unit?.tenant||'',unit:unit?.label||'',property:propertyId,period:'May 2026',method,source,amount:parseFloat(amt)||0,status:'paid',date}});

// ── REDUCER ───────────────────────────────────────────────────────────────────
function reducer(state,action) {
  let next;
  switch(action.type) {
    case 'TOGGLE_COMP': {
      const groups=state.compliance[action.propertyId].map((g,gi)=>gi!==action.gi?g:{...g,items:g.items.map((it,ii)=>ii!==action.ii?it:{...it,done:!it.done})});
      next={...state,compliance:{...state.compliance,[action.propertyId]:groups}};break;}
    case 'ADD_PAYMENT': next={...state,payments:[action.payment,...state.payments]};break;
    case 'ADD_PROP':    next={...state,properties:[...state.properties,action.prop]};break;
    case 'ADD_TENANT': {
      // If filling a vacant unit, update that unit; otherwise add new unit row
      const exists=state.tenants.find(u=>u.id===action.tenant.id);
      const tenants=exists
        ? state.tenants.map(u=>u.id===action.tenant.id?action.tenant:u)
        : [...state.tenants,action.tenant];
      next={...state,tenants};break;}
    case 'ADD_UNIT': next={...state,tenants:[...state.tenants,action.unit]};break;
    default: return state;
  }
  saveStore(next);return next;
}

  const handleExport=()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(store,null,2)],{type:'application/json'}));
    a.download='homerun-backup.json';a.click();
  };

  const openAddTenant=(unit)=>{setPreUnit(unit||null);setShowTenant(true);};

  let primaryAction;
  if(active==='payments') primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowPay(true)}>Record payment</Btn>;
  else if(active==='expenses') primaryAction=<Btn variant="primary" icon="plus">Add expense</Btn>;
  else if(active==='repairs')  primaryAction=<Btn variant="primary" icon="plus">New ticket</Btn>;
  else if(active==='documents') primaryAction=<Btn variant="primary" icon="download">Generate all</Btn>;
  else if(active==='tenants')  primaryAction=<div style={{display:'flex',gap:8}}>
    <Btn variant="outline" icon="door-open" onClick={()=>setShowUnit(true)}>Add unit</Btn>
    <Btn variant="primary" icon="user-plus" onClick={()=>openAddTenant(null)}>Add tenant</Btn>
  </div>;
  else if(active==='units') primaryAction=<div style={{display:'flex',gap:8}}>
    <Btn variant="outline" icon="door-open" onClick={()=>setShowUnit(true)}>Add unit</Btn>
    <Btn variant="primary" icon="user-plus" onClick={()=>openAddTenant(null)}>Add tenant</Btn>
  </div>;
  else primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowAdd(true)}>Add property</Btn>;

  const p={store,propertyId:curProp,navigate:nav,dispatch,onAddTenant:openAddTenant,onAddUnit:()=>setShowUnit(true)};
  let view;
  if(active==='dashboard')   view=<Dashboard {...p}/>;
  else if(active==='portfolio')   view=<Portfolio {...p} setCurrentProp={setCurrentProp}/>;
  else if(active==='units')       view=<UnitsView {...p}/>;
  else if(active==='tenants')     view=<Tenants {...p}/>;
  else if(active==='payments')    view=<Payments {...p} openRecord={()=>setShowPay(true)}/>;
  else if(active==='expenses')    view=<Expenses {...p}/>;
  else if(active==='financials')  view=<Financials {...p}/>;
  else if(active==='repairs')     view=<Repairs {...p}/>;
  else if(active==='schedule')    view=<Schedule {...p}/>;
  else if(active==='local-laws')  view=<ComplianceView {...p}/>;
  else if(active==='section-8')   view=<Section8View {...p}/>;
  else if(active==='documents')   view=<Documents {...p}/>;
  else if(active==='checklists')  view=<Checklists/>;

  return <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-canvas)'}}>
    <Sidebar store={store} currentProp={curProp} setCurrent={setCurrentProp}
      activeKey={active} onNav={nav} onAddProp={()=>setShowAdd(true)} onExport={handleExport}/>
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
      <TopBar title={meta.t} subtitle={subtitle} primaryAction={primaryAction}/>
      <main style={{padding:'28px 32px 96px',flex:1,width:'100%',maxWidth:1440}}>{view}</main>
    </div>
    <RecordModal open={showPay} onClose={()=>setShowPay(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
    <AddPropModal open={showAdd} onClose={()=>setShowAdd(false)} dispatch={dispatch}/>
    <AddTenantModal open={showTenant} onClose={()=>{setShowTenant(false);setPreUnit(null);}} store={store} propertyId={curProp} dispatch={dispatch} preUnit={preUnit}/>
    <AddUnitModal open={showUnit} onClose={()=>setShowUnit(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
  </div>;
}

setTimeout(()=>ReactDOM.createRoot(document.getElementById('root')).render(<App/>),80);
</script>
</body>
</html>
