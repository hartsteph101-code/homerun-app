    secondary:{background:'var(--surface-2)',color:'var(--fg-1)',border:'1px solid var(--line-2)'},
    ghost:{background:'transparent',color:'var(--fg-2)',border:'1px solid transparent'},
    outline:{background:'transparent',color:'var(--fg-1)',border:'1px solid var(--line-2)'},
    danger:{background:'var(--out-tint)',color:'var(--out-500)',border:'1px solid rgba(224,122,95,0.35)'},
    safe:{background:'var(--safe-tint)',color:'var(--safe-500)',border:'1px solid rgba(136,176,122,0.35)'},
  };
  const S={sm:{padding:'5px 10px',fontSize:12},md:{padding:'9px 14px',fontSize:14},lg:{padding:'12px 20px',fontSize:15}};
  return <button type={type||'button'} onClick={onClick} disabled={disabled} style={{

      email: email.trim(),
      options: { emailRedirectTo: window.location.href }

    if(authError){
      // Fall back to simulated flow for local file testing

            {error}

// ── APPLICATION FORM ──────────────────────────────────────────────────────────
const ApplicationForm = ({unitId,unitLabel,propName,rent}) => {
  const [step,setStep]=useState(1);
  const TOTAL=5;

  // Step 1 — Personal
  const [name,setName]=useState('');
  const [dob,setDob]=useState('');
  const [phone,setPhone]=useState('');
  const [email,setEmail]=useState('');
  const [currentAddress,setCurrentAddress]=useState('');
  const [timeAtAddress,setTimeAtAddress]=useState('');

  // Step 2 — Employment & income
  const [employer,setEmployer]=useState('');
  const [employmentType,setEmploymentType]=useState('full-time');
  const [monthlyIncome,setMonthlyIncome]=useState('');
  const [timeAtJob,setTimeAtJob]=useState('');

  // Step 3 — Household & vehicle
  const [occupants,setOccupants]=useState('1');
  const [hasPets,setHasPets]=useState(false);
  const [petDetails,setPetDetails]=useState('');
  const [hasVehicle,setHasVehicle]=useState(false);
  const [vehicleYear,setVehicleYear]=useState('');
  const [vehicleMake,setVehicleMake]=useState('');
  const [vehicleModel,setVehicleModel]=useState('');
  const [vehiclePlate,setVehiclePlate]=useState('');

  // Step 4 — Background check / SSN
  const [ssn,setSsn]=useState('');
  const [ssnMasked,setSsnMasked]=useState(false);
  const [bgConsent,setBgConsent]=useState(false);
  const [signature,setSignature]=useState('');

  // Step 5 — Confirmation
  const [submitted,setSubmitted]=useState(false);

  useEffect(()=>{ setTimeout(()=>window.lucide&&window.lucide.createIcons(),60); });

  const fmtSSN = (v) => {
    const digits=v.replace(/\D/g,'').slice(0,9);
    if(digits.length<=3) return digits;
    if(digits.length<=5) return digits.slice(0,3)+'-'+digits.slice(3);
    return digits.slice(0,3)+'-'+digits.slice(3,5)+'-'+digits.slice(5);
  };
  const maskedSSN = ssn ? '***-**-'+ssn.replace(/\D/g,'').slice(-4) : '';

  const submit = async () => {
    const app = {
      unit_id:unitId, unit_label:unitLabel, prop_name:propName, rent:parseFloat(rent)||0,
      name, dob, phone, email, current_address:currentAddress, time_at_address:timeAtAddress,
      employer, employment_type:employmentType, monthly_income:parseFloat(monthlyIncome)||0, time_at_job:timeAtJob,
      occupants, has_pets:hasPets, pet_details:petDetails,
      has_vehicle:hasVehicle, vehicle_year:vehicleYear, vehicle_make:vehicleMake,
      vehicle_model:vehicleModel, vehicle_plate:vehiclePlate,
      ssn_last4:ssn.replace(/\D/g,'').slice(-4),
      bg_consent:bgConsent, signature, status:'pending',
    };
    // Write to Supabase (works when served over https)
    try {
      await supabase.from('applications').insert([app]);
    } catch(e) {}
    // Also write to localStorage for local testing
    try {
      const store=JSON.parse(localStorage.getItem('homerun_v2')||'{}');
      const localApp={...app,id:'app-'+Date.now(),property:'hammond',submittedAt:new Date().toISOString().slice(0,10)};
      store.applications=[localApp,...(store.applications||[])];
      localStorage.setItem('homerun_v2',JSON.stringify(store));
    } catch(e){}
    setSubmitted(true);
  };

  const inpStyle={width:'100%',background:'#F4F4F2',border:'1px solid #D1D5DB',
    borderRadius:6,padding:'11px 14px',color:'#1a1a1a',fontSize:15,outline:'none',
    fontFamily:'Geist,sans-serif',boxSizing:'border-box'};
  const labelStyle={display:'block',fontSize:11,fontWeight:600,letterSpacing:'0.08em',
    textTransform:'uppercase',color:'#6B7280',marginBottom:6};
  const fieldStyle={display:'flex',flexDirection:'column',gap:0};

  if(submitted) return (
    <div style={{minHeight:'100vh',background:'var(--teal-950)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:440}}>
        <div style={{width:64,height:64,borderRadius:'var(--r-pill)',background:'var(--safe-tint)',
          color:'var(--safe-500)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px'}}>
          <i data-lucide="check-circle" style={{width:32,height:32}}/>
        </div>
        <h1 style={{fontFamily:'Instrument Serif,serif',fontSize:36,color:'var(--fg-1)',margin:'0 0 12px'}}>Application submitted.</h1>
        <p style={{fontSize:14,color:'var(--fg-3)',lineHeight:1.6,margin:'0 0 8px'}}>
          Thank you, {name.split(' ')[0]}. Your application for <strong style={{color:'var(--fg-1)'}}>{unitLabel}</strong> at <strong style={{color:'var(--fg-1)'}}>{propName}</strong> has been received.
        </p>
        <p style={{fontSize:13,color:'var(--fg-4)',lineHeight:1.6,margin:0}}>
          The landlord will review your application and be in touch at {email}.
        </p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#F9FAFB',fontFamily:'Geist,sans-serif'}}>
      {/* Header */}
      <div style={{background:'var(--teal-950)',padding:'16px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="#2A8B82"/>
            <path d="M14 7L21 14L14 21L7 14Z" fill="#5EEAD4" opacity="0.9"/>
            <path d="M14 10L18 14L14 18L10 14Z" fill="#081413" opacity="0.6"/>
          </svg>
          <span style={{fontFamily:'Instrument Serif,serif',fontSize:18,color:'var(--cream-50)'}}>HomeRun</span>
          <span style={{color:'var(--cream-300)',fontSize:13}}>· Rental Application</span>
        </div>
        <div style={{fontSize:12,color:'var(--cream-300)'}}>Step {step} of {TOTAL}</div>
      </div>

      {/* Progress */}
      <div style={{height:3,background:'#E5E7EB'}}>
        <div style={{height:'100%',background:'#2A8B82',width:`${(step/TOTAL)*100}%`,transition:'width 300ms'}}/>
      </div>

      {/* Unit info banner */}
      <div style={{background:'#EFF6FF',borderBottom:'1px solid #DBEAFE',padding:'12px 24px',
        display:'flex',alignItems:'center',gap:16,justifyContent:'center'}}>
        <div style={{fontSize:13,color:'#1e40af',textAlign:'center'}}>
          Applying for <strong>{unitLabel}</strong> at <strong>{propName}</strong> · <strong style={{fontFamily:'Geist Mono,monospace'}}>${rent}/mo</strong>
        </div>
      </div>

      <div style={{maxWidth:560,margin:'0 auto',padding:'32px 24px 80px'}}>
        {/* Step 1 — Personal info */}
        {step===1&&<>
          <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,color:'#1a1a1a',margin:'0 0 6px'}}>Personal information.</h2>
          <p style={{fontSize:14,color:'#6B7280',margin:'0 0 28px',lineHeight:1.6}}>Basic information about you as the applicant.</p>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={fieldStyle}><label style={labelStyle}>Full legal name *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="First Last" style={inpStyle}/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div style={fieldStyle}><label style={labelStyle}>Date of birth *</label><input value={dob} onChange={e=>setDob(e.target.value)} type="date" style={inpStyle}/></div>
              <div style={fieldStyle}><label style={labelStyle}>Phone *</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(555) 555-5555" type="tel" style={inpStyle}/></div>
            </div>
            <div style={fieldStyle}><label style={labelStyle}>Email address *</label><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" type="email" style={inpStyle}/></div>
            <div style={fieldStyle}><label style={labelStyle}>Current address *</label><input value={currentAddress} onChange={e=>setCurrentAddress(e.target.value)} placeholder="123 Main St, City, State ZIP" style={inpStyle}/></div>
            <div style={fieldStyle}><label style={labelStyle}>How long at current address?</label>
              <select value={timeAtAddress} onChange={e=>setTimeAtAddress(e.target.value)} style={{...inpStyle,cursor:'pointer',appearance:'none',
                backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5' fill='none'/></svg>")`,
                backgroundRepeat:'no-repeat',backgroundPosition:'right 12px center',paddingRight:32}}>
                <option value="">Select...</option>
                {['Less than 6 months','6–12 months','1–2 years','2–5 years','5+ years'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          </div>
        </>}

        {/* Step 2 — Employment */}
        {step===2&&<>
          <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,color:'#1a1a1a',margin:'0 0 6px'}}>Employment & income.</h2>
          <p style={{fontSize:14,color:'#6B7280',margin:'0 0 28px',lineHeight:1.6}}>We verify that monthly income is at least 3× the monthly rent (${Math.round(parseFloat(rent||0)*3).toLocaleString()}/mo minimum).</p>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={fieldStyle}><label style={labelStyle}>Employer name *</label><input value={employer} onChange={e=>setEmployer(e.target.value)} placeholder="Company name or Self-employed" style={inpStyle}/></div>
            <div style={fieldStyle}><label style={labelStyle}>Employment type *</label>
              <select value={employmentType} onChange={e=>setEmploymentType(e.target.value)} style={{...inpStyle,cursor:'pointer',appearance:'none',
                backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5' fill='none'/></svg>")`,
                backgroundRepeat:'no-repeat',backgroundPosition:'right 12px center',paddingRight:32}}>
                {['Full-time','Part-time','Self-employed','Retired','Other'].map(o=><option key={o} value={o.toLowerCase().replace('-','').replace(' ','-')}>{o}</option>)}
              </select>
            </div>
            <div style={fieldStyle}><label style={labelStyle}>Gross monthly income ($) *</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#6B7280',fontSize:15}}>$</span>
                <input value={monthlyIncome} onChange={e=>setMonthlyIncome(e.target.value)} type="number" placeholder="0" style={{...inpStyle,paddingLeft:28}}/>
              </div>
              {monthlyIncome&&<div style={{fontSize:12,marginTop:6,color:parseFloat(monthlyIncome)>=parseFloat(rent||0)*3?'#166534':'#991b1b'}}>
                {parseFloat(monthlyIncome)>=parseFloat(rent||0)*3?'✓ Meets the 3× income requirement':'✗ Does not meet the 3× income requirement'}
              </div>}
            </div>
            <div style={fieldStyle}><label style={labelStyle}>How long at current job?</label>
              <select value={timeAtJob} onChange={e=>setTimeAtJob(e.target.value)} style={{...inpStyle,cursor:'pointer',appearance:'none',
                backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5' fill='none'/></svg>")`,
                backgroundRepeat:'no-repeat',backgroundPosition:'right 12px center',paddingRight:32}}>
                <option value="">Select...</option>
                {['Less than 6 months','6–12 months','1–2 years','2–5 years','5+ years'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          </div>
        </>}

        {/* Step 3 — Household & vehicle */}
        {step===3&&<>
          <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,color:'#1a1a1a',margin:'0 0 6px'}}>Household & vehicle.</h2>
          <p style={{fontSize:14,color:'#6B7280',margin:'0 0 28px',lineHeight:1.6}}>Tell us about who will be living in the unit and any vehicles.</p>
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            <div style={fieldStyle}><label style={labelStyle}>Total number of occupants (including yourself) *</label>
              <select value={occupants} onChange={e=>setOccupants(e.target.value)} style={{...inpStyle,cursor:'pointer',appearance:'none',
                backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5' fill='none'/></svg>")`,
                backgroundRepeat:'no-repeat',backgroundPosition:'right 12px center',paddingRight:32}}>
                {['1','2','3','4','5','6+'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>

            {/* Pets toggle */}
            <div>
              <button onClick={()=>setHasPets(p=>!p)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                width:'100%',padding:'14px 16px',cursor:'pointer',textAlign:'left',
                background:hasPets?'#EFF6FF':'#F3F4F6',border:`1.5px solid ${hasPets?'#2A8B82':'#D1D5DB'}`,
                borderRadius:8,transition:'all 150ms',fontFamily:'Geist,sans-serif'}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>Pets</div>
                  <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>{hasPets?'Pet details required below':'No pets'}</div>
                </div>
                <div style={{width:44,height:24,borderRadius:999,background:hasPets?'#2A8B82':'#D1D5DB',position:'relative',transition:'background 150ms',flexShrink:0}}>
                  <div style={{position:'absolute',top:3,left:hasPets?20:3,width:18,height:18,borderRadius:'50%',background:'white',transition:'left 150ms',boxShadow:'0 1px 3px rgba(0,0,0,0.3)'}}/>
                </div>
              </button>
              {hasPets&&<input value={petDetails} onChange={e=>setPetDetails(e.target.value)} placeholder="Type, breed, weight (e.g. Dog, Labrador, 45 lbs)" style={{...inpStyle,marginTop:8}}/>}
            </div>

            {/* Vehicle toggle */}
            <div>
              <button onClick={()=>setHasVehicle(v=>!v)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                width:'100%',padding:'14px 16px',cursor:'pointer',textAlign:'left',
                background:hasVehicle?'#EFF6FF':'#F3F4F6',border:`1.5px solid ${hasVehicle?'#2A8B82':'#D1D5DB'}`,
                borderRadius:8,transition:'all 150ms',fontFamily:'Geist,sans-serif'}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>Vehicle</div>
                  <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>{hasVehicle?'Vehicle details required below':'No vehicle'}</div>
                </div>
                <div style={{width:44,height:24,borderRadius:999,background:hasVehicle?'#2A8B82':'#D1D5DB',position:'relative',transition:'background 150ms',flexShrink:0}}>
                  <div style={{position:'absolute',top:3,left:hasVehicle?20:3,width:18,height:18,borderRadius:'50%',background:'white',transition:'left 150ms',boxShadow:'0 1px 3px rgba(0,0,0,0.3)'}}/>
                </div>
              </button>
              {hasVehicle&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
                <input value={vehicleYear} onChange={e=>setVehicleYear(e.target.value)} placeholder="Year" style={inpStyle}/>
                <input value={vehicleMake} onChange={e=>setVehicleMake(e.target.value)} placeholder="Make (e.g. Toyota)" style={inpStyle}/>
                <input value={vehicleModel} onChange={e=>setVehicleModel(e.target.value)} placeholder="Model (e.g. Camry)" style={inpStyle}/>
                <input value={vehiclePlate} onChange={e=>setVehiclePlate(e.target.value)} placeholder="License plate" style={inpStyle}/>
              </div>}
            </div>
          </div>
        </>}

        {/* Step 4 — Background check */}
        {step===4&&<>
          <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,color:'#1a1a1a',margin:'0 0 6px'}}>Background check consent.</h2>
          <p style={{fontSize:14,color:'#6B7280',margin:'0 0 28px',lineHeight:1.6}}>Your SSN is used solely for background and credit check purposes.</p>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{padding:'14px 16px',background:'#FEF3C7',borderRadius:8,border:'1px solid #FCD34D',fontSize:13,color:'#92400E',lineHeight:1.5}}>
              <strong>Demo notice:</strong> This is a simulated application. In production, your SSN would be transmitted directly to a licensed background check provider and never stored by HomeRun.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>Social Security Number *</label>
              <div style={{position:'relative'}}>
                <input
                  value={ssnMasked?maskedSSN:ssn}
                  onChange={e=>{ if(!ssnMasked) setSsn(fmtSSN(e.target.value)); }}
                  onBlur={()=>setSsnMasked(true)}
                  onFocus={()=>setSsnMasked(false)}
                  placeholder="###-##-####"
                  style={{...inpStyle,fontFamily:'Geist Mono,monospace',letterSpacing:'0.1em'}}/>
                <button onClick={()=>setSsnMasked(m=>!m)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                  background:'transparent',border:'none',cursor:'pointer',color:'#6B7280',padding:4}}>
                  <i data-lucide={ssnMasked?'eye':'eye-off'} style={{width:16,height:16}}/>
                </button>
              </div>
              {ssn&&<div style={{fontSize:11,color:'#6B7280',marginTop:4,display:'flex',alignItems:'center',gap:5}}>
                <i data-lucide="shield" style={{width:11,height:11}}/> Stored as {maskedSSN}
              </div>}
            </div>

            <button onClick={()=>setBgConsent(c=>!c)} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'16px',
              background:bgConsent?'#F0FDF4':'#F9FAFB',border:`1.5px solid ${bgConsent?'#16a34a':'#D1D5DB'}`,
              borderRadius:8,cursor:'pointer',textAlign:'left',fontFamily:'Geist,sans-serif',transition:'all 150ms'}}>
              <div style={{width:20,height:20,borderRadius:4,flexShrink:0,marginTop:1,
                background:bgConsent?'#16a34a':'transparent',border:`1.5px solid ${bgConsent?'#16a34a':'#D1D5DB'}`,
                display:'flex',alignItems:'center',justifyContent:'center',transition:'all 120ms'}}>
                {bgConsent&&<i data-lucide="check" style={{width:13,height:13,color:'white'}}/>}
              </div>
              <div style={{fontSize:13,color:'#374151',lineHeight:1.6}}>
                I authorize the landlord to obtain a background check and credit report using the information provided. I certify that all information in this application is true and accurate to the best of my knowledge.
              </div>
            </button>

            <div style={fieldStyle}>
              <label style={labelStyle}>Electronic signature (type your full name) *</label>
              <input value={signature} onChange={e=>setSignature(e.target.value)}
                placeholder="Type your full legal name to sign"
                style={{...inpStyle,fontFamily:'Georgia,serif',fontSize:17,fontStyle:'italic',
                  borderColor:signature?'#2A8B82':'#D1D5DB'}}/>
              {signature&&<div style={{fontSize:11,color:'#6B7280',marginTop:4}}>
                Signed electronically · {new Date().toLocaleDateString()}
              </div>}
            </div>
          </div>
        </>}

        {/* Step 5 — Review & submit */}
        {step===5&&<>
          <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,color:'#1a1a1a',margin:'0 0 6px'}}>Review & submit.</h2>
          <p style={{fontSize:14,color:'#6B7280',margin:'0 0 28px',lineHeight:1.6}}>Review your information before submitting.</p>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[
              {title:'Personal',items:[{k:'Name',v:name},{k:'DOB',v:dob},{k:'Phone',v:phone},{k:'Email',v:email},{k:'Address',v:currentAddress}]},
              {title:'Employment',items:[{k:'Employer',v:employer},{k:'Type',v:employmentType},{k:'Monthly income',v:monthlyIncome?'$'+parseFloat(monthlyIncome).toLocaleString():''},{k:'Time at job',v:timeAtJob}]},
              {title:'Household',items:[{k:'Occupants',v:occupants},{k:'Pets',v:hasPets?petDetails||'Yes':'No'},{k:'Vehicle',v:hasVehicle?`${vehicleYear} ${vehicleMake} ${vehicleModel}`.trim()||'Yes':'No'}]},
              {title:'Background check',items:[{k:'SSN',v:maskedSSN},{k:'Consent',v:bgConsent?'✓ Given':'Not given'},{k:'Signature',v:signature}]},
            ].map(s=><div key={s.title} style={{background:'#F9FAFB',borderRadius:8,border:'1px solid #E5E7EB',overflow:'hidden'}}>
              <div style={{padding:'10px 16px',background:'#F3F4F6',borderBottom:'1px solid #E5E7EB',
                fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#6B7280'}}>{s.title}</div>
              <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
                {s.items.filter(r=>r.v).map((r,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={{color:'#6B7280'}}>{r.k}</span>
                  <span style={{color:'#1a1a1a',fontWeight:500}}>{r.v}</span>
                </div>)}
              </div>
            </div>)}
            <div style={{padding:'12px 14px',background:'#EFF6FF',borderRadius:8,border:'1px solid #BFDBFE',
              fontSize:12,color:'#1e40af',lineHeight:1.5}}>
              By submitting, I confirm all information is accurate and consent to a background check.
            </div>
          </div>
        </>}

        {/* Navigation */}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:32,gap:12}}>
          {step>1
            ?<button onClick={()=>setStep(s=>s-1)} style={{display:'flex',alignItems:'center',gap:6,
              background:'transparent',border:'1px solid #D1D5DB',borderRadius:6,padding:'10px 16px',
              cursor:'pointer',fontFamily:'Geist,sans-serif',fontSize:14,color:'#374151'}}>
              <i data-lucide="arrow-left" style={{width:14,height:14}}/> Back
            </button>
            :<div/>}
          {step<TOTAL
            ?<button onClick={()=>setStep(s=>s+1)} style={{display:'flex',alignItems:'center',gap:6,
              background:'#2A8B82',border:'1px solid #2A8B82',borderRadius:6,padding:'10px 20px',
              cursor:'pointer',fontFamily:'Geist,sans-serif',fontSize:14,fontWeight:500,color:'white'}}>
              Continue <i data-lucide="arrow-right" style={{width:14,height:14}}/>
            </button>
            :<button onClick={submit} disabled={!bgConsent||!signature} style={{
              display:'flex',alignItems:'center',gap:6,
              background:bgConsent&&signature?'#2A8B82':'#9CA3AF',
              border:'none',borderRadius:6,padding:'10px 20px',
              cursor:bgConsent&&signature?'pointer':'not-allowed',
              fontFamily:'Geist,sans-serif',fontSize:14,fontWeight:500,color:'white'}}>
              <i data-lucide="send" style={{width:14,height:14}}/> Submit application
            </button>}
        </div>
      </div>
    </div>
  );
};

// ── APPLY CONTEXT ─────────────────────────────────────────────────────────────
function getApplyContext() {
  try {
    const stored = localStorage.getItem('homerun_apply');
    if(stored){ const d=JSON.parse(stored); localStorage.removeItem('homerun_apply'); return d; }
  } catch(e){}
  const params = new URLSearchParams(window.location.search);
  const unitId = params.get('apply');
  if(unitId) return {unitId,unitLabel:params.get('unit')||'Unit',propName:params.get('prop')||'',rent:params.get('rent')||'0'};
  return null;
}

function App() {
  const applyContext = getApplyContext();
  const [screen,setScreen]=useState(applyContext?'apply':'email');
  const [email,setEmail]=useState('');
  const [tenant,setTenant]=useState(null);
  const [demoApply,setDemoApply]=useState(false);

  useEffect(()=>{
    // Check for existing Supabase session (from magic link redirect)
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user?.email){
        const t=TENANT_DB.find(x=>x.email===session.user.email);
        if(t){ setTenant(t); setScreen('dashboard'); }
      }
    });
    supabase.auth.onAuthStateChange((_,session)=>{
      if(session?.user?.email){
        const t=TENANT_DB.find(x=>x.email===session.user.email);
        if(t){ setTenant(t); setScreen('dashboard'); }
      }
    });
    setTimeout(()=>window.lucide&&window.lucide.createIcons(),60);
  },[]);

  if(screen==='apply'||demoApply){
    return <ApplicationForm
      unitId={applyContext?.unitId||'h-4'}
      unitLabel={applyContext?.unitLabel||'Unit 4'}
      propName={applyContext?.propName||'Hammond Fourplex'}
      rent={applyContext?.rent||'1150'}/>;
  }
  if(screen==='dashboard'&&tenant){
    return <TenantDashboard tenant={tenant} onSignOut={()=>{setScreen('email');setEmail('');setTenant(null);}}/>;
  }
  if(screen==='code'){
    return <CodeScreen email={email} onVerify={(t)=>{setTenant(t);setScreen('dashboard');}} onBack={()=>setScreen('email')}/>;
  }
  return <EmailScreen onSend={(e)=>{
    if(e==='demo-apply'){setDemoApply(true);return;}
    setEmail(e);setScreen('code');
  }}/>;
}

setTimeout(()=>ReactDOM.createRoot(document.getElementById('root')).render(<App/>),80);
</script>
</body>
</html>
