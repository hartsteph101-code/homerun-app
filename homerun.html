const ActionListView = ({store,dispatch,navigate,onGoDoc,onOpenPay}) => {
  const mob = useMobile();
  const [newItemText,setNewItemText] = useState('');
  const [showAdd,setShowAdd] = useState(false);
  const [filter,setFilter] = useState('all');
  const [detailItem,setDetailItem] = useState(null);
  const [completing,setCompleting] = useState({});
  const dismissed = store.dismissedActions||[];

  const allSystemItems = buildActionItems(store, navigate, dispatch);
  const systemItems = allSystemItems.filter(i=>!dismissed.includes(i.id));
  const customItems = (store.customActions||[]).map(i=>({...i,type:'custom'}));
  const allItems = [...systemItems,...customItems].sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]);
  const filtered = filter==='all' ? allItems : filter==='custom' ? customItems : allItems.filter(i=>i.priority===filter);

  const counts = {
    all:allItems.length,
    critical:allItems.filter(i=>i.priority==='critical').length,
    warning:allItems.filter(i=>i.priority==='warning').length,
    info:allItems.filter(i=>i.priority==='info').length,
    custom:customItems.length,
  };

  const handleAction = (item,e) => {
    e?.stopPropagation();
    if(item.action?.modal==='pay'){onOpenPay&&onOpenPay();return;}
    if(item.action?.docId){onGoDoc&&onGoDoc(item.action.docId,item.action.unitId||null);return;}
    if(item.action?.nav) navigate(item.action.nav);
  };

  const handleComplete = (item,e) => {
    e?.stopPropagation();
    if(completing[item.id]) return;
    setCompleting(c=>({...c,[item.id]:'completing'}));
    if(item.type==='custom') dispatch({type:'TOGGLE_CUSTOM_ACTION',id:item.id});
    else if(item.sourceType==='compliance') dispatch({type:'TOGGLE_COMP',propertyId:item.property,gi:item.sourceGi,ii:item.sourceIi});
    setTimeout(()=>{
      setCompleting(c=>({...c,[item.id]:'done'}));
      setTimeout(()=>{
        if(item.type!=='custom') dispatch({type:'DISMISS_ACTION',id:item.id});
        setCompleting(c=>{ const n={...c}; delete n[item.id]; return n; });
      },400);
    },3000);
  };

  const handleUndo = (item,e) => {
    e?.stopPropagation();
    setCompleting(c=>{ const n={...c}; delete n[item.id]; return n; });
    if(item.type==='custom') dispatch({type:'TOGGLE_CUSTOM_ACTION',id:item.id});
    else if(item.sourceType==='compliance') dispatch({type:'TOGGLE_COMP',propertyId:item.property,gi:item.sourceGi,ii:item.sourceIi});
    if(item.type!=='custom') dispatch({type:'RESTORE_ACTION',id:item.id});
  };

  const addCustom = () => {
    if(!newItemText.trim()) return;
    dispatch({type:'ADD_CUSTOM_ACTION',item:{id:'ca-'+Date.now(),title:newItemText.trim(),done:false,priority:'info',createdAt:new Date().toISOString().slice(0,10)}});
    setNewItemText('');setShowAdd(false);
  };

  const openDetail = (item) => {
    const t=item.title.toLowerCase();
    const steps=
      /annual rental registration/.test(t)?['Gather proof of ownership','Obtain proof of insurance (Declaration Page)','Complete registration form','Pay $5/unit fee','Submit by April 15','Retain certificate']:
      /smoke|carbon monoxide/.test(t)?['Install smoke detector in each bedroom','Install on each level','Install CO detector for gas appliances','Test before move-in','Document inspection']:
      /security deposit/.test(t)?['Document deposit in lease','Conduct move-in inspection','At move-out, inspect and itemize','Return within 45 days']:
      /entry notice/.test(t)?['Provide 48 hours written notice','State date, time, purpose','Keep a copy','Emergency entry permitted without notice']:
      /fair housing|anti-discrimination/.test(t)?['Review marketing for discriminatory language','Apply identical criteria to all applicants','Document screening decisions']:
      /pay or quit/.test(t)?['Calculate exact unpaid rent','Prepare written notice with amount','Serve notice','Document service','Wait full 10 days']:
      /repair/.test(t)?['Assess the issue','Contact vendor for quote','Schedule repair','Document completion and cost']:
      /lease expir/.test(t)?['Contact tenant about renewal','Generate new lease','Review and update terms','Have both parties sign']:
      /vacancy|vacant/.test(t)?['List unit on Zillow, Facebook Marketplace','Set asking rent','Schedule showings','Use invite link for applications']:
      /bill of rights/.test(t)?['Review Hammond Ordinance No. 9844','Include TBoR in lease','Provide written copy at move-in','Issue receipt for cash payments within 3 days']:
      [];
    setDetailItem({...item,steps,description:item.detail});
  };

  const chipStyle=(active,tint)=>({padding:'6px 14px',borderRadius:'var(--r-pill)',fontSize:12,cursor:'pointer',
    fontFamily:'Geist,sans-serif',fontWeight:500,transition:'all 120ms',
    background:active?(tint||'var(--surface-3)'):'transparent',
    border:`1px solid ${active?'var(--line-2)':'var(--line-1)'}`,
    color:active?'var(--fg-1)':'var(--fg-3)'});

  if(detailItem) return <ActionItemDetail item={detailItem} store={store} dispatch={dispatch}
    onBack={()=>setDetailItem(null)} onGoDoc={onGoDoc} navigate={navigate} onOpenPay={onOpenPay}/>;

  return <div style={{display:'flex',flexDirection:'column',gap:24,maxWidth:980}}>
    <MetricStrip items={[
      {label:'Total open',value:allItems.filter(i=>!i.done).length,mono:true},
      {label:'Critical',value:counts.critical,tone:counts.critical?'out':null},
      {label:'Warning',value:counts.warning,tone:'play'},
      {label:'Info',value:counts.info},
      {label:'Custom',value:counts.custom,mono:true},
    ]}/>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
      <button onClick={()=>setFilter('all')} style={chipStyle(filter==='all')}>All <span className="mono" style={{marginLeft:5,color:'var(--fg-4)'}}>{counts.all}</span></button>
      <button onClick={()=>setFilter('critical')} style={chipStyle(filter==='critical','var(--out-tint)')}><span style={{color:'var(--out-500)'}}>● </span>Critical <span className="mono" style={{marginLeft:5,color:'var(--fg-4)'}}>{counts.critical}</span></button>
      <button onClick={()=>setFilter('warning')} style={chipStyle(filter==='warning','var(--play-tint)')}><span style={{color:'var(--play-500)'}}>● </span>Warning <span className="mono" style={{marginLeft:5,color:'var(--fg-4)'}}>{counts.warning}</span></button>
      <button onClick={()=>setFilter('info')} style={chipStyle(filter==='info','var(--info-tint)')}><span style={{color:'var(--info-500)'}}>● </span>Info <span className="mono" style={{marginLeft:5,color:'var(--fg-4)'}}>{counts.info}</span></button>
      <button onClick={()=>setFilter('custom')} style={chipStyle(filter==='custom')}>Custom <span className="mono" style={{marginLeft:5,color:'var(--fg-4)'}}>{counts.custom}</span></button>
      <div style={{flex:1}}/>
      <Btn variant="primary" size="sm" icon="plus" onClick={()=>setShowAdd(s=>!s)}>Add item</Btn>
    </div>
    {showAdd&&<Card padding={16}>
      <div style={{display:'flex',gap:10}}>
        <input value={newItemText} onChange={e=>setNewItemText(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')addCustom();if(e.key==='Escape')setShowAdd(false);}}
          placeholder="Add an action item… (Enter to save)" autoFocus
          style={{flex:1,background:'var(--surface-2)',border:'1px solid var(--line-2)',
          borderRadius:'var(--r-1)',padding:'9px 12px',color:'var(--fg-1)',fontFamily:'Geist,sans-serif',fontSize:14,outline:'none'}}/>
        <Btn variant="primary" size="sm" onClick={addCustom} disabled={!newItemText.trim()}>Add</Btn>
        <Btn variant="ghost" size="sm" onClick={()=>{setShowAdd(false);setNewItemText('');}}>Cancel</Btn>
      </div>
    </Card>}
    {filtered.length===0
      ?<Card padding={36} style={{textAlign:'center'}}>
        <div style={{fontSize:14,color:'var(--fg-3)'}}>{filter==='all'?'No open action items. Everything is under control.':'No items in this category.'}</div>
      </Card>
      :<div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(item=>{
          const priorityColor=PRIORITY_COLOR[item.priority];
          const icon=TYPE_ICON[item.type]||'circle';
          const canCheck=item.type==='custom'||(item.sourceType==='compliance');
          const completingState=completing[item.id];
          const isDone=completingState==='completing'||completingState==='done';
          return <div key={item.id} onClick={()=>openDetail(item)} style={{
            background:'var(--surface-1)',border:'1px solid var(--line-1)',
            borderLeft:`3px solid ${isDone?'var(--safe-500)':priorityColor}`,
            borderRadius:'var(--r-2)',
            display:'grid',gridTemplateColumns:'auto 1fr auto',gap:14,alignItems:'center',
            padding:'14px 18px',cursor:'pointer',
            opacity:completingState==='done'?0:1,
            transition:completingState==='done'?'opacity 400ms':'opacity 150ms',
          }}>
            {canCheck
              ?<button onClick={e=>isDone?handleUndo(item,e):handleComplete(item,e)} style={{
                width:20,height:20,borderRadius:4,flexShrink:0,
                background:isDone?'var(--safe-500)':'transparent',
                border:`1.5px solid ${isDone?'var(--safe-500)':'var(--line-2)'}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:'pointer',padding:0,transition:'all 120ms',

                {isDone&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                  <path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

                <i data-lucide={icon} style={{width:15,height:15,color:isDone?'var(--safe-500)':priorityColor}}/>

            <div style={{minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,lineHeight:1.3,

function reducer(state,action) {
  let next;
  switch(action.type) {
    case 'LOAD_STORE': return {...defaultStore(),...action.store};
    case 'TOGGLE_COMP': {
      const groups=state.compliance[action.propertyId].map((g,gi)=>gi!==action.gi?g:{...g,items:g.items.map((it,ii)=>ii!==action.ii?it:{...it,done:!it.done})});
      next={...state,compliance:{...state.compliance,[action.propertyId]:groups}};break;}
    case 'ADD_PAYMENT': next={...state,payments:[action.payment,...state.payments]};break;
    case 'ADD_EXPENSE': next={...state,expenses:[action.expense,...state.expenses]};break;
    case 'ADD_REPAIR':  next={...state,repairs:[action.repair,...state.repairs]};break;
    case 'EDIT_REPAIR': next={...state,repairs:state.repairs.map(r=>r.id===action.repair.id?action.repair:r)};break;
    case 'EDIT_TENANT': next={...state,tenants:state.tenants.map(u=>u.id===action.tenant.id?action.tenant:u)};break;
    case 'ADD_PROP':    next={...state,properties:[...state.properties,action.prop]};break;
    case 'ADD_TENANT': {
      // If filling a vacant unit, update that unit; otherwise add new unit row
      const exists=state.tenants.find(u=>u.id===action.tenant.id);
      const tenants=exists
        ? state.tenants.map(u=>u.id===action.tenant.id?action.tenant:u)
        : [...state.tenants,action.tenant];
      next={...state,tenants};break;}
    case 'ADD_SCHED':    next={...state,schedTasks:[...state.schedTasks,action.task]};break;
    case 'DELETE_SCHED': next={...state,schedTasks:state.schedTasks.filter(t=>t.id!==action.id)};break;
    case 'ADD_APPLICATION': next={...state,applications:[action.app,...(state.applications||[])]};break;
    case 'UPDATE_APPLICATION': next={...state,applications:(state.applications||[]).map(a=>a.id===action.app.id?action.app:a)};break;
    case 'ADD_CUSTOM_ACTION': next={...state,customActions:[...(state.customActions||[]),action.item]};break;
    case 'REMOVE_CUSTOM_ACTION': next={...state,customActions:(state.customActions||[]).filter(i=>i.id!==action.id)};break;
    case 'TOGGLE_CUSTOM_ACTION': next={...state,customActions:(state.customActions||[]).map(i=>i.id===action.id?{...i,done:!i.done}:i)};break;
    case 'UPDATE_CUSTOM_ACTION': next={...state,customActions:(state.customActions||[]).map(i=>i.id===action.id?{...i,...action.changes}:i)};break;
    case 'DISMISS_ACTION': next={...state,dismissedActions:[...(state.dismissedActions||[]),action.id]};break;
    case 'RESTORE_ACTION': next={...state,dismissedActions:(state.dismissedActions||[]).filter(id=>id!==action.id)};break;
    case 'ADD_UNIT': next={...state,tenants:[...state.tenants,action.unit]};break;
    default: return state;
  }
  saveStore(next);return next;
}

            display:'flex',alignItems:'center',gap:6,padding:'8px 12px',
            background:'transparent',border:'1px dashed var(--line-2)',
            borderRadius:'var(--r-pill)',cursor:'pointer',color:'var(--fg-3)',fontFamily:'Geist,sans-serif',fontSize:13,
          }}><i data-lucide="plus" style={{width:12,height:12}}/>Add</button>
        </div>
      </div>
      {/* Nav items */}
      <div style={{padding:'12px 12px 8px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4}}>
        {allItems.map(item=>{
          const active=item.key===activeKey;
          return <button key={item.key} onClick={()=>{onNav(item.key);onClose();}} style={{
            display:'flex',flexDirection:'column',alignItems:'center',gap:5,
            padding:'12px 8px',borderRadius:'var(--r-2)',
            background:active?'var(--surface-2)':'transparent',
            color:active?'var(--accent)':'var(--fg-2)',
            border:'none',cursor:'pointer',fontFamily:'Geist,sans-serif',fontSize:11,fontWeight:active?600:400,
          }}>
            <i data-lucide={item.icon} style={{width:18,height:18}}/>
            {item.label}
          </button>;
        })}
      </div>
      {/* Export */}
      <div style={{padding:'8px 20px 12px',borderTop:'1px solid var(--line-1)',display:'flex',justifyContent:'flex-end'}}>
        <button onClick={()=>{onExport();onClose();}} style={{
          display:'flex',alignItems:'center',gap:6,background:'transparent',border:'none',
          color:'var(--fg-3)',cursor:'pointer',fontFamily:'Geist,sans-serif',fontSize:12,
        }}><i data-lucide="download" style={{width:13,height:13}}/>Export data</button>
      </div>
    </div>
  </>;
};

const MobileBottomNav = ({activeKey,onNav,onMore,primaryAction}) => (
  <div className="bottom-nav" style={{
    position:'fixed',bottom:0,left:0,right:0,zIndex:80,
    background:'var(--surface-0)',borderTop:'1px solid var(--line-1)',
    display:'flex',alignItems:'stretch',paddingBottom:8,
    boxShadow:'0 -8px 24px rgba(0,0,0,0.3)',
  }}>
    {BOTTOM_TABS.map(tab=>{
      const active=tab.key===activeKey||(tab.key==='more'&&!BOTTOM_TABS.slice(0,4).find(t=>t.key===activeKey));
      const isMore=tab.key==='more';
      return <button key={tab.key} onClick={isMore?onMore:()=>onNav(tab.key)} style={{
        flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        gap:3,padding:'8px 4px',background:'transparent',border:'none',cursor:'pointer',
        color:active?'var(--accent)':'var(--fg-4)',fontFamily:'Geist,sans-serif',
        fontSize:10,fontWeight:active?600:400,minHeight:56,
      }}>
        <i data-lucide={tab.icon} style={{width:20,height:20}}/>
        <span>{tab.label}</span>
      </button>;
    })}
  </div>
);

// ── APP ───────────────────────────────────────────────────────────────────────
const TITLES={
  home:{t:'Home'},
  dashboard:{t:'Dashboard'},portfolio:{t:'Portfolio',sub:'All properties'},
  units:{t:'Units'},tenants:{t:'Tenants'},payments:{t:'Payments'},
  expenses:{t:'Expenses'},financials:{t:'Financials',sub:'P&L · cash basis'},
  repairs:{t:'Repairs'},schedule:{t:'Schedule',sub:'Upcoming events & deadlines'},
  'local-laws':{t:'Local laws',sub:'Compliance tracker'},
  'section-8':{t:'Section 8',sub:'HCV program tracking'},
  'action-list':{t:'Action list',sub:'Everything that needs your attention'},
  checklists:{t:'Checklists',sub:'Recurring + one-time'},
};
const PROP_CTX=['dashboard','units','tenants','payments','expenses','financials','repairs','local-laws','section-8','documents','applications'];

function App() {
  const mob=useMobile();
  const [session,setSession]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [store,dispatch]=useReducer(reducer,null,loadStore);
  const [syncReady,setSyncReady]=useState(false);
  const [active,setActive]=useState('home');
  const [curProp,setCurProp]=useState('hammond');

  // Auth — check session on load and listen for changes
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setAuthLoading(false);
      if(session) loadAndSyncStore(session.user.id);
    });
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session) loadAndSyncStore(session.user.id);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const loadAndSyncStore = async (userId) => {
    const remoteStore = await loadStoreFromSupabase(userId);
    if(remoteStore && Object.keys(remoteStore).length > 0){
      // Remote data exists — use it
      dispatch({type:'LOAD_STORE', store:remoteStore});
    } else {
      // First login — push local data to Supabase
      const local = loadStore();
      await saveStoreToSupabase(userId, local);
    }
    setSyncReady(true);
  };

  // Sync store to Supabase on every change (debounced)
  useEffect(()=>{
    if(!session||!syncReady) return;
    const t = setTimeout(()=>saveStoreToSupabase(session.user.id, store), 1500);
    return ()=>clearTimeout(t);
  },[store,session,syncReady]);

  const [drawerOpen,setDrawerOpen]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [showTenant,setShowTenant]=useState(false);
  const [showUnit,setShowUnit]=useState(false);
  const [preUnit,setPreUnit]=useState(null);
  const [showExpense,setShowExpense]=useState(false);
  const [showRepair,setShowRepair]=useState(false);
  const [editTenant,setEditTenant]=useState(null);
  const [editRepair,setEditRepair]=useState(null);
  const [inviteUnit,setInviteUnit]=useState(null);
  const [showSearch,setShowSearch]=useState(false);
  const [showEvent,setShowEvent]=useState(false);
  const [eventPrefill,setEventPrefill]=useState(null);
  const [depositTenant,setDepositTenant]=useState(null);
  const [docContext,setDocContext]=useState({doc:null,unit:null});

  useEffect(()=>{const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),60);return()=>clearTimeout(t);});

  const prop=store.properties.find(p=>p.id===curProp)||store.properties[0];
  const meta=TITLES[active]||{t:''};
  const subtitle=active==='home'?null:(meta.sub||(PROP_CTX.includes(active)?`${prop.name} · ${prop.units} units · ${prop.city}`:null));

  const nav=(key)=>setActive(key);
  const setCurrentProp=(id)=>{setCurProp(id);setActive('dashboard');};
  const openDashboard=(propId,view='dashboard')=>{setCurProp(propId);setActive(view);};

  const handleExport=()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(store,null,2)],{type:'application/json'}));
    a.download='homerun-backup.json';a.click();
  };

  const openAddTenant=(unit)=>{setPreUnit(unit||null);setShowTenant(true);};
  const goDoc=(docId,unitId)=>{setDocContext({doc:docId,unit:unitId||null});setActive('documents');};
  const openAddEvent=(prefill)=>{setEventPrefill(prefill||null);setShowEvent(true);};

  useEffect(()=>{
    const handler=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setShowSearch(s=>!s);}};
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);

  let primaryAction;
  if(active==='home') primaryAction=null;
  else if(active==='payments') primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowPay(true)}>Record payment</Btn>;
  else if(active==='expenses') primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowExpense(true)}>Add expense</Btn>;
  else if(active==='repairs')  primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowRepair(true)}>New ticket</Btn>;
  else if(active==='documents') primaryAction=<Btn variant="primary" icon="download">Generate all</Btn>;
  else if(active==='tenants')  primaryAction=<div style={{display:'flex',gap:8}}>
    <Btn variant="outline" icon="door-open" onClick={()=>setShowUnit(true)}>Add unit</Btn>
    <Btn variant="primary" icon="user-plus" onClick={()=>openAddTenant(null)}>Add tenant</Btn>
  </div>;
  else if(active==='units') primaryAction=<div style={{display:'flex',gap:8}}>
    <Btn variant="outline" icon="door-open" onClick={()=>setShowUnit(true)}>Add unit</Btn>
    <Btn variant="primary" icon="user-plus" onClick={()=>openAddTenant(null)}>Add tenant</Btn>
  </div>;
  else primaryAction=<Btn variant="primary" icon="plus" onClick={()=>setShowAdd(true)}>Add property</Btn>;

  const p={store,propertyId:curProp,navigate:nav,dispatch,onAddTenant:openAddTenant,onAddUnit:()=>setShowUnit(true),onAddExpense:()=>setShowExpense(true),onAddRepair:()=>setShowRepair(true),onEditTenant:(t)=>setEditTenant(t),onGoDoc:goDoc,onAddEvent:openAddEvent,onEditRepair:(r)=>setEditRepair(r),onInvite:(u)=>setInviteUnit(u)};
  let view;
  if(active==='action-list') view=<ActionListView store={store} dispatch={dispatch} navigate={nav} onGoDoc={goDoc} onOpenPay={()=>setShowPay(true)}/>;
  else if(active==='dashboard')   view=<Dashboard {...p}/>;
  else if(active==='dashboard')   view=<Dashboard {...p}/>;
  else if(active==='portfolio')   view=<Portfolio {...p} setCurrentProp={setCurrentProp}/>;
  else if(active==='units')       view=<UnitsView {...p}/>;
  else if(active==='tenants')     view=<Tenants {...p}/>;
  else if(active==='payments')    view=<Payments {...p} openRecord={()=>setShowPay(true)}/>;
  else if(active==='expenses')    view=<Expenses {...p}/>;
  else if(active==='financials')  view=<Financials {...p}/>;
  else if(active==='repairs')     view=<Repairs {...p}/>;
  else if(active==='schedule')    view=<Schedule {...p} onAddEvent={openAddEvent}/>;
  else if(active==='local-laws')  view=<ComplianceView {...p} onGoDoc={goDoc} onAddEvent={(prefill)=>{setEventPrefill(prefill);setShowEvent(true);}}/>;
  else if(active==='section-8')   view=<Section8View {...p}/>;
  else if(active==='documents')   view=<Documents {...p} initDoc={docContext.doc} initUnit={docContext.unit}/>;
  else if(active==='checklists')  view=<Checklists/>;
  else if(active==='applications') view=<ApplicationsView {...p} onInvite={(u)=>setInviteUnit(u)}/>;

  const isHome=active==='home';

  // Auth gate
  if(authLoading) return <div style={{minHeight:'100vh',background:'var(--bg-canvas)',display:'flex',
    alignItems:'center',justifyContent:'center'}}>
    <div style={{fontSize:14,color:'var(--fg-3)',fontFamily:'Geist,sans-serif'}}>Loading…</div>
  </div>;

  if(!session) return <AuthScreen onAuth={setSession}/>;

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  return isHome
    ? <LandingPage store={store} mob={mob} onEnter={(propId,dest)=>{if(propId)setCurProp(propId);setActive(dest||'dashboard');}}/>
    : <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-canvas)'}}>
    {!mob&&<Sidebar store={store} currentProp={curProp} setCurrent={setCurrentProp}
      activeKey={active} onNav={nav} onAddProp={()=>setShowAdd(true)} onExport={handleExport}
      onSignOut={handleSignOut} userEmail={session?.user?.email}/>}
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
      <TopBar title={meta.t} subtitle={subtitle} primaryAction={primaryAction} onSearch={()=>setShowSearch(true)}
        onBack={mob&&!BOTTOM_TAB_KEYS.includes(active)?()=>setActive('dashboard'):null}/>
      <main style={{padding:mob?'16px 16px 96px':'28px 32px 96px',flex:1,maxWidth:1440,overflowY:'auto'}}>{view}</main>
    </div>
    {mob&&<MobileBottomNav activeKey={active} onNav={nav} onMore={()=>setDrawerOpen(true)}/>}
    {mob&&<MobileDrawer open={drawerOpen} onClose={()=>setDrawerOpen(false)}
      activeKey={active} onNav={nav} store={store}
      currentProp={curProp} setCurrent={(id)=>{setCurProp(id);setActive('dashboard');setDrawerOpen(false);}}
      onAddProp={()=>{setShowAdd(true);setDrawerOpen(false);}} onExport={handleExport}/>}
    <RecordModal open={showPay} onClose={()=>setShowPay(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
    <AddPropModal open={showAdd} onClose={()=>setShowAdd(false)} dispatch={dispatch}/>
    <AddTenantModal open={showTenant} onClose={()=>{setShowTenant(false);setPreUnit(null);}} store={store} propertyId={curProp} dispatch={dispatch} preUnit={preUnit} onGoDoc={goDoc}/>
    <AddUnitModal open={showUnit} onClose={()=>setShowUnit(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
    <AddExpenseModal open={showExpense} onClose={()=>setShowExpense(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
    <AddRepairModal open={showRepair} onClose={()=>setShowRepair(false)} store={store} propertyId={curProp} dispatch={dispatch}/>
    <EditRepairModal open={!!editRepair} onClose={()=>setEditRepair(null)} repair={editRepair} store={store} propertyId={curProp} dispatch={dispatch}/>
    <EditTenantModal open={!!editTenant} onClose={()=>setEditTenant(null)} tenant={editTenant} store={store} propertyId={curProp} dispatch={dispatch} onEndTenancy={(t)=>{setEditTenant(null);setDepositTenant(t);}}/>
    <AddEventModal open={showEvent} onClose={()=>{setShowEvent(false);setEventPrefill(null);}} dispatch={dispatch} prefill={eventPrefill}/>
    <DepositReturnModal open={!!depositTenant} onClose={()=>setDepositTenant(null)} tenant={depositTenant} dispatch={dispatch}/>
    <SearchModal open={showSearch} onClose={()=>setShowSearch(false)} store={store} onNavigate={nav} onSetProp={setCurrentProp} onGoDoc={(docId)=>{goDoc(docId,null);setShowSearch(false);}}/>
    <InviteModal open={!!inviteUnit} onClose={()=>setInviteUnit(null)} unit={inviteUnit} prop={store.properties.find(p=>p.id===curProp)}/>
  </div>;
}

setTimeout(()=>ReactDOM.createRoot(document.getElementById('root')).render(<App/>),80);
</script>
</body>
</html>
