// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://lzdxwjbdrwcakxuhhrtw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_C7ERLF_dIwh0788YuFJrfw_M_YBdt2T';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadStoreFromSupabase(userId) {
  const { data, error } = await supabase
    .from('owner_data')
    .select('store')
    .eq('owner_id', userId)
    .single();
  if(error || !data) return null;
  return data.store;
}

async function saveStoreToSupabase(userId, store) {
  await supabase
    .from('owner_data')
    .upsert({ owner_id: userId, store }, { onConflict: 'owner_id' });
}

const AuthScreen = ({onAuth}) => {
  const [email,setEmail] = useState('');
  const [sent,setSent] = useState(false);
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');

  const sendLink = async () => {
    if(!email.trim()) return;
    setLoading(true); setError('');
    const { error } = await supabase.auth.signInWithOtp({
      email: email.trim(),
      options: {
        emailRedirectTo: window.location.href,
      }
    });
    setLoading(false);
    if(error) { setError(error.message); return; }
    setSent(true);
  };

  if(sent) return (
    <div style={{minHeight:'100vh',background:'var(--bg-canvas)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:400}}>

        <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:32,color:'var(--fg-1)',margin:'0 0 12px'}}>Check your email.</h2>
        <p style={{fontSize:14,color:'var(--fg-3)',lineHeight:1.6,margin:'0 0 6px'}}>We sent a sign-in link to</p>
        <p style={{fontSize:15,fontWeight:600,color:'var(--fg-1)',margin:'0 0 28px'}}>{email}</p>
        <p style={{fontSize:12,color:'var(--fg-4)',lineHeight:1.6}}>Click the link in the email to open HomeRun. You can close this tab.</p>
        <button onClick={()=>setSent(false)} style={{marginTop:20,background:'transparent',border:'none',
          color:'var(--fg-3)',cursor:'pointer',fontSize:13,fontFamily:'Geist,sans-serif',textDecoration:'underline'}}>
          Use a different email
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-canvas)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>

            <rect width="28" height="28" rx="6" fill="#2A8B82"/>
            <path d="M14 7L21 14L14 21L7 14Z" fill="#5EEAD4" opacity="0.9"/>
            <path d="M14 10L18 14L14 18L10 14Z" fill="#081413" opacity="0.6"/>
          </svg>

        </div>
        <h1 style={{fontFamily:'Instrument Serif,serif',fontSize:36,color:'var(--fg-1)',margin:'0 0 10px',letterSpacing:'-0.01em'}}>Welcome back.</h1>
        <p style={{fontSize:14,color:'var(--fg-3)',margin:'0 0 32px',lineHeight:1.6}}>Enter your email to receive a sign-in link. No password needed.</p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          <button onClick={sendLink} disabled={!email.trim()||loading} style={{
            background:'var(--brand)',border:'1px solid var(--brand)',color:'var(--on-brand)',
            borderRadius:'var(--r-1)',padding:'12px',cursor:!email.trim()||loading?'not-allowed':'pointer',

        </div>
      </div>
    </div>
  );
};

// ── MOBILE HOOK ───────────────────────────────────────────────────────────────
function useMobile() {
  const [mob, setMob] = useState(false);
  useEffect(() => {
    const check = () => setMob(window.innerWidth < 768);
    check(); // set on mount
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);
  return mob;
}

function loadStore() {
  try { const s = localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return defaultStore();
}
function saveStore(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e){} }

const fmt = (n,dec=0) => '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
const fmtSigned = (n,dec=0) => (n<0?'−':'')+fmt(n,dec);
function compProg(groups=[]) {
  let done=0,total=0;
  groups.forEach(g=>g.items.forEach(it=>{total++;if(it.done)done++;}));
  return {done,total,pct:total===0?0:Math.round(done/total*100)};
}
function grpProg(g) { const d=g.items.filter(i=>i.done).length; return {done:d,total:g.items.length}; }

// ── LIVE ALERT GENERATION ─────────────────────────────────────────────────────
function computeAlerts(store, propertyId) {
  const alerts = [];
  const today = new Date('2026-05-13');
  const units = store.tenants.filter(u=>u.property===propertyId);

  // Late rent
  units.filter(u=>u.status==='late').forEach(u=>{
    alerts.push({tier:'critical',icon:'alert-octagon',
      title:`${u.label} rent late — ${u.tenant}`,
      detail:`${fmt(u.tenantShare||u.rent)} ${u.daysLate?u.daysLate+'d ':'' }past due.${u.lease==='Section 8'?' HAP received in full.':''}`,
      action:'Pay or Quit', meta:`${u.label} · ${u.daysLate?u.daysLate+' days late':'Late'}`,
      docId:'pay-quit', unitId:u.id,
    });
  });

  // Critical compliance items not done
  const cg = store.compliance[propertyId]||[];
  cg.forEach(g=>{
    g.items.filter(it=>!it.done&&it.severity==='critical').forEach(it=>{
      alerts.push({tier:'critical',icon:'shield-alert',
        title:it.title, detail:it.desc||it.due,
        action:'View compliance', meta:`${g.juris} · ${it.due}`,
      });
    });
  });

  // Lease expiring within 90 days
  units.filter(u=>u.tenant&&u.leaseEnd).forEach(u=>{
    const daysLeft=Math.round((new Date(u.leaseEnd)-today)/(1000*60*60*24));
    if(daysLeft<=90&&daysLeft>-30){
      const expired=daysLeft<=0;
      alerts.push({
        tier:expired||daysLeft<=30?'critical':daysLeft<=60?'warning':'info',
        icon:'calendar-clock',
        title:expired?`Lease expired — ${u.tenant}`:`Lease expiring — ${u.tenant}`,
        detail:expired
          ?`${u.label} lease ended ${u.leaseEnd}. Now month-to-month.`
          :`${u.label} lease ends ${u.leaseEnd}. ${daysLeft} days remaining.`,
        action:'Generate lease', meta:`${u.label} · ${expired?'Expired':daysLeft+'d remaining'}`,
        docId:'lease', unitId:u.id,
      });
    }
  });

  // Warning compliance items
  cg.forEach(g=>{
    g.items.filter(it=>!it.done&&it.severity==='warning').forEach(it=>{
      alerts.push({tier:'warning',icon:'shield',
        title:it.title, detail:it.desc||it.due,
        action:'View compliance', meta:`${g.juris} · ${it.due}`,
      });
    });
  });

  // High-priority open repairs
  store.repairs.filter(r=>r.property===propertyId&&r.priority==='high'&&r.status!=='completed').forEach(r=>{
    alerts.push({tier:'warning',icon:'wrench',
      title:`Open repair — ${r.title}`,
      detail:r.notes||'No notes recorded.',
      action:'Assign vendor', meta:`${r.unit} · Opened ${r.opened}`,
    });
  });

  // Schedule items due in next 7 days
  store.schedTasks.filter(t=>{
    const diff=Math.round((new Date(t.date)-today)/(1000*60*60*24));
    return diff>=0&&diff<=7&&t.tone==='critical';
  }).forEach(t=>{
    alerts.push({tier:'info',icon:'calendar-clock',
      title:`Due soon — ${t.label}`,
      detail:`Scheduled for ${t.date}.`,
      meta:`Schedule · ${t.date}`,
    });
  });

  // Vacant units
  const vacancies=units.filter(u=>u.status==='vacant');
  if(vacancies.length>0){
    alerts.push({tier:'info',icon:'door-open',
      title:`${vacancies.length} vacant unit${vacancies.length>1?'s':''}`,
      detail:vacancies.map(u=>`${u.label} — asking ${fmt(u.rent)}/mo`).join(' · '),
      meta:'No income from vacant units',
    });
  }

  return alerts;
}

const Tenants = ({store,propertyId,onAddTenant,onAddUnit,onEditTenant,onGoDoc}) => {

  const expiring=ten.filter(u=>{
    if(!u.leaseEnd)return false;
    const d=Math.round((new Date(u.leaseEnd)-today)/(1000*60*60*24));
    return d<=90&&d>-30;
  }).sort((a,b)=>new Date(a.leaseEnd)-new Date(b.leaseEnd));
  return <div style={{display:'flex',flexDirection:'column',gap:24,maxWidth:980}}>
    <SHead title="Tenants" icon="users" meta={`${ten.length} active`}
      action={<div style={{display:'flex',gap:8}}>
        <Btn variant="outline" icon="door-open" onClick={onAddUnit}>Add unit</Btn>
        <Btn variant="primary" icon="user-plus" onClick={()=>onAddTenant&&onAddTenant(null)}>Add tenant</Btn>
      </div>}/>

    {expiring.length>0&&<div>
      <Eyebrow style={{marginBottom:10}}>Leases expiring within 90 days</Eyebrow>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {expiring.map(u=>{
          const daysLeft=Math.round((new Date(u.leaseEnd)-today)/(1000*60*60*24));
          const expired=daysLeft<=0;
          const tone=expired||daysLeft<=30?'out':daysLeft<=60?'play':'info';
          return <div key={u.id} style={{
            display:'flex',alignItems:'center',gap:14,padding:'12px 16px',
            background:'var(--surface-1)',border:'1px solid var(--line-1)',

          }}>
            <Dia color={`var(--${tone}-500)`} size={8}/>

            </div>
            <Badge tone={tone}>{expired?'Expired':daysLeft+'d left'}</Badge>
            <Btn variant="outline" size="sm" icon="file-text" onClick={()=>onGoDoc&&onGoDoc('lease',u.id)}>Generate lease</Btn>
          </div>;
        })}
      </div>
    </div>}

    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {ten.map(u=><div key={u.id} style={{display:'grid',gridTemplateColumns:'1fr auto',gap:0,
        background:'var(--surface-1)',border:'1px solid var(--line-1)',borderRadius:'var(--r-2)',overflow:'hidden'}}>
        <LRow
          primary={u.tenant}

            <Badge tone={u.lease==='Section 8'?'play':'brand'}>{u.lease}</Badge>

              <i data-lucide="mail" style={{width:10,height:10}}/>{u.email}
            </span>}
          </>}
          right={fmt(u.rent)+'/mo'}
          status={u.status==='late'?'Late':'Current'}
          statusTone={u.status==='late'?'out':'safe'}
          onClick={()=>onEditTenant&&onEditTenant(u)}/>

const Payments = ({store,propertyId,openRecord}) => {
  const [uFilter,setU]=useState('');
  const [sFilter,setS]=useState('');
  const all=store.payments.filter(p=>p.property===propertyId);
  const filtered=all.filter(p=>(!uFilter||p.unit===uFilter)&&(!sFilter||p.status===sFilter));
  const totals=filtered.reduce((a,p)=>{if(p.status==='paid')a.recv+=p.amount;else if(p.status==='late')a.out+=p.amount;return a;},{recv:0,out:0});
  const uNames=[...new Set(all.map(p=>p.unit))];
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>

// ── EXPENSES ──────────────────────────────────────────────────────────────────
const Expenses = ({store,propertyId,onAddExpense}) => {
  const [cat,setCat]=useState('');
  const all=store.expenses.filter(e=>e.property===propertyId);
  const cats=[...new Set(all.map(e=>e.cat))];
  const filtered=all.filter(e=>!cat||e.cat===cat);
  const total=filtered.reduce((a,e)=>a+e.amount,0);
  const paid=filtered.filter(e=>e.status==='paid').reduce((a,e)=>a+e.amount,0);
  const byCat=cats.map(c=>({cat:c,total:all.filter(e=>e.cat===c).reduce((a,e)=>a+e.amount,0)})).sort((a,b)=>b.total-a.total);
  const chip=(active)=>({background:active?'var(--surface-2)':'transparent',border:`1px solid ${active?'var(--line-2)':'var(--line-1)'}`,
    color:active?'var(--fg-1)':'var(--fg-2)',padding:'6px 12px',borderRadius:'var(--r-pill)',fontSize:12,cursor:'pointer',fontFamily:'Geist,sans-serif',fontWeight:500});
  return <div style={{display:'flex',flexDirection:'column',gap:24}}>
    <MetricStrip items={[
      {label:'Total expenses',value:fmt(total),tone:'out'},
      {label:'Paid',value:fmt(paid),sub:`${filtered.filter(e=>e.status==='paid').length} txns`},
      {label:'Pending',value:fmt(total-paid),tone:total-paid?'play':null,sub:filtered.filter(e=>e.status!=='paid').length+' txns'},
      {label:'Biggest',value:byCat[0]?.cat||'—',mono:false,sub:byCat[0]?fmt(byCat[0].total):''},
    ]}/>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      <button onClick={()=>setCat('')} style={chip(cat==='')}>All <span className="mono" style={{marginLeft:6,color:'var(--fg-3)'}}>{all.length}</span></button>
      {byCat.map(c=><button key={c.cat} onClick={()=>setCat(c.cat)} style={chip(cat===c.cat)}>
        {c.cat} <span className="mono" style={{marginLeft:6,color:'var(--fg-3)'}}>{fmt(c.total)}</span>
      </button>)}
    </div>
    <div>
      <SHead title="Expenses" icon="receipt" meta={`${filtered.length} txns`}
        action={<Btn variant="primary" icon="plus" onClick={onAddExpense}>Add expense</Btn>}/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.map(e=><LRow key={e.id}
          primary={e.desc} secondary={`${e.vendor} · ${e.unit} · ${e.method}`}
          badges={<Badge tone={e.cat==='Repairs'?'out':e.cat==='Utilities'?'info':e.cat==='Mortgage'?'neutral':e.cat==='Insurance'?'play':'brand'}>{e.cat}</Badge>}
          right={`−${fmt(e.amount)}`}
          status={e.status==='paid'?'Paid':'Pending'} statusTone={e.status==='paid'?'safe':'play'}
          rightSub={`· ${e.date}`}/>)}
      </div>
    </div>
  </div>;
};

        <span style={{fontFamily:'Instrument Serif,serif',fontSize:64,lineHeight:1,color:'var(--fg-1)'}}>{fmt(net)}</span>

    </Card>

      <table style={{width:'100%',borderCollapse:'collapse',fontVariantNumeric:'tabular-nums'}}>
        <tbody>
          <tr style={{background:'var(--surface-0)'}}>
            <td style={{padding:'10px 24px',fontSize:11,color:'var(--fg-3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Income</td><td/>
          </tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={pL}>Rent collected</td><td style={pA}>{fmt(pmts.filter(p=>p.source==='Tenant'&&p.status==='paid').reduce((a,p)=>a+p.amount,0))}</td></tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={pL}>HAP / Section 8</td><td style={pA}>{fmt(pmts.filter(p=>p.source==='HAP'&&p.status==='paid').reduce((a,p)=>a+p.amount,0))}</td></tr>
          <tr style={{borderTop:'1px solid var(--line-1)'}}><td style={{...pL,fontWeight:500,color:'var(--fg-1)'}}>Total income</td><td style={{...pA,color:'var(--safe-500)',fontWeight:500}}>{fmt(totalIn)}</td></tr>
          <tr style={{background:'var(--surface-0)'}}><td style={{padding:'10px 24px',fontSize:11,color:'var(--fg-3)',textTransform:'uppercase',letterSpacing:'0.08em',borderTop:'1px solid var(--line-1)'}}>Expenses</td><td style={{borderTop:'1px solid var(--line-1)'}}/></tr>

          <tr style={{borderTop:'1px solid var(--line-2)',background:'var(--surface-0)'}}>

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
const Schedule = ({store,dispatch,onAddEvent}) => {
  const tc={critical:'var(--out-500)',warning:'var(--play-500)',info:'var(--teal-300)'};
  const tagTone={compliance:'play',rent:'safe',repair:'out',recurring:'brand',inspection:'info'};
  // Group by month
  const grouped=store.schedTasks.reduce((acc,e)=>{
    const mon=e.date.slice(0,7);
    if(!acc[mon])acc[mon]=[];
    acc[mon].push(e);
    return acc;
  },{});
  return <div style={{display:'flex',flexDirection:'column',gap:18,maxWidth:720}}>
    <SHead title="Upcoming" icon="calendar" meta={`${store.schedTasks.length} events`}
      action={<Btn variant="primary" icon="plus" onClick={onAddEvent}>Add event</Btn>}/>
    {Object.entries(grouped).sort().map(([mon,events])=><div key={mon}>
      <Eyebrow style={{marginBottom:10,paddingLeft:4}}>{new Date(mon+'-02').toLocaleDateString('en-US',{month:'long',year:'numeric'})}</Eyebrow>
      <Card padding={0}>
        {events.map((e,i)=><div key={e.id} style={{display:'grid',gridTemplateColumns:'72px 1fr auto 32px',gap:12,alignItems:'center',
          padding:'14px 20px',borderTop:i?'1px solid var(--line-1)':'none'}}>
          <div className="mono" style={{fontSize:13,color:'var(--fg-2)'}}>{e.date.slice(5)}</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Dia color={tc[e.tone]||'var(--fg-3)'} size={8}/>
            <span style={{fontSize:14,color:'var(--fg-1)'}}>{e.label}</span>
          </div>
          <Badge tone={tagTone[e.tag]||'neutral'}>{e.tag}</Badge>
          <button onClick={()=>dispatch({type:'DELETE_SCHED',id:e.id})} style={{
            background:'transparent',border:'none',cursor:'pointer',color:'var(--fg-4)',
            padding:4,borderRadius:'var(--r-1)',display:'flex',alignItems:'center',justifyContent:'center',
          }}><i data-lucide="x" style={{width:13,height:13}}/></button>
        </div>)}
      </Card>
    </div>)}
    {store.schedTasks.length===0&&<Card padding={36} style={{textAlign:'center'}}>
      <div style={{fontSize:14,color:'var(--fg-3)'}}>No upcoming events. Add one to start tracking deadlines.</div>
    </Card>}

};

// ── COMPLIANCE ────────────────────────────────────────────────────────────────
const ComplianceView = ({store,propertyId,dispatch,onGoDoc,onAddEvent}) => {
  const groups=store.compliance[propertyId]||[];
  const cp=compProg(groups);
  const prop=store.properties.find(p=>p.id===propertyId);
  const [expandedItem,setExpandedItem]=useState(null); // `${gi}-${ii}`

  // Action guidance per common item types
  const getActionSteps = (it) => {
    const t=it.title.toLowerCase();
    if(/annual rental registration/.test(t)) return [
      'Gather proof of ownership (deed or mortgage)',
      'Obtain proof of property insurance (Declaration Page)',
      'Complete the registration form for each parcel',
      'Pay $5 per unit/building/parcel registration fee',
      'Submit in person or via email to the Building Department by April 15',
      'Retain your registration certificate on file',
    ];
    if(/lead-based paint/.test(t)) return [
      'Obtain the EPA pamphlet "Protect Your Family from Lead in Your Home"',
      'Complete the Lead-Based Paint Disclosure form',
      'Provide both to tenant before lease signing',
      'Have tenant sign the disclosure form',
      'Retain a copy of the signed disclosure for at least 3 years',
    ];
    if(/smoke|carbon monoxide/.test(t)) return [
      'Install smoke detector in each bedroom and sleeping area',
      'Install smoke detector on each level of the unit',
      'Install CO detector if unit has gas appliances or attached garage',
      'Test all detectors before tenant move-in',
      'Document inspection date and results',
      'Replace batteries annually and detectors per manufacturer schedule',
    ];
    if(/security deposit/.test(t)) return [
      'Document the deposit amount in the lease agreement',
      'Conduct and document a move-in inspection',
      'At move-out, conduct a move-out inspection',
      'Prepare an itemized list of any deductions with documentation',
      'Return deposit + itemized statement within 45 days of move-out',
      'Keep records of all deposit transactions for at least 5 years',
    ];
    if(/entry notice/.test(t)) return [
      'Provide written notice at least 48 hours before entry',
      'Notice should state the date, time, and purpose of entry',
      'Acceptable notice methods: written letter, email, or text (keep a copy)',
      'Emergency entry is permitted without notice — document the emergency',
      'Do not enter without notice except in genuine emergencies',
    ];
    if(/fair housing|anti-discrimination/.test(t)) return [
      'Review all marketing materials for discriminatory language',
      'Apply identical screening criteria to all applicants',
      'Document screening decisions with objective reasons',
      'Never ask about protected class status in applications or conversations',
      'Post fair housing compliance statement in advertising',
      'Keep all application records for at least 3 years',
    ];
    if(/pay or quit/.test(t)) return [
      'Calculate the exact amount of unpaid rent owed',
      'Prepare a written Pay or Quit notice with the exact amount',
      'Serve the notice — in person, posting on door, or certified mail',
      'Document the date and method of service',
      'Wait the full 10 days before filing any eviction action',
      'If tenant pays in full within 10 days, the notice is resolved',
    ];
    if(/insurance/.test(t)) return [
      'Obtain a landlord/rental property insurance policy',
      'Request a Declaration Page from your insurer',
      'Submit Declaration Page with annual registration',
      'Ensure coverage amount meets city requirements',
      'Update coverage when adding properties or units',
    ];
    if(/managing agent/.test(t)) return [
      'Designate a managing agent who resides in or maintains an office in Lake County, IN',
      'Provide their name, address, and emergency contact on the registration form',
      'Update agent information promptly if it changes',
      'Ensure the agent is reachable for tenant emergencies',
    ];
    if(/tenant.s bill of rights|bill of rights/i.test(t)) return [
      'Review Hammond Ordinance No. 9844 in full via the source link',
      'Ensure your lease includes the required TBoR language (use the lease builder)',
      'Provide tenant with written notice of their rights at move-in',
      'Provide a receipt for any cash rent payments within 3 days',
      'Maintain all habitability standards required by the ordinance',
      'Do not retaliate against tenants who exercise their rights under the TBoR',
      'Keep a copy of the signed TBoR acknowledgment in the tenant file',
    ];
    if(/habitability/.test(t)) return [
      'Inspect all units for plumbing, heating, and weatherproofing issues',
      'Ensure heat reaches at least 65°F in all habitable rooms',
      'Ensure all windows and doors seal properly',
      'Address any pest infestations promptly',
      'Maintain all appliances and systems provided in the lease',
      'Respond to habitability complaints in writing within a reasonable time',
    ];
    return [
      'Review the full ordinance text via the source link below',
      'Consult a licensed Indiana landlord-tenant attorney if uncertain',
      'Document your compliance steps and keep records',
    ];
  };

  return <div style={{display:'flex',flexDirection:'column',gap:24,maxWidth:980}}>
    <Card padding={28}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:24,marginBottom:14}}>
        <div style={{minWidth:0}}>
          <Eyebrow>Compliance · {prop?.name}</Eyebrow>
          <div style={{marginTop:8,fontFamily:'Instrument Serif,serif',fontSize:44,lineHeight:1.05,color:'var(--fg-1)'}}>
            {cp.done}<span style={{fontStyle:'italic',fontSize:22,color:'var(--fg-3)',marginLeft:10}}>of {cp.total} complete</span>
          </div>
          <div className="meta" style={{marginTop:8}}>Across {groups.length} jurisdictions</div>
        </div>
        <span className="mono" style={{fontSize:36,color:cp.pct<30?'var(--play-500)':'var(--safe-500)',fontWeight:500}}>{cp.pct}%</span>
      </div>
      <Prog value={cp.done} total={cp.total} height={8} color={cp.pct<30?'var(--play-500)':'var(--safe-500)'}/>
    </Card>
    {groups.map((g,gi)=>{const gp=grpProg(g);return <div key={gi}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <i data-lucide={g.icon} style={{width:17,height:17,color:'var(--fg-2)'}}/>
        <h4 style={{fontSize:16,fontWeight:600,margin:0,color:'var(--fg-1)'}}>{g.juris}</h4>
        <Badge tone={gp.done===gp.total&&gp.total>0?'safe':gp.done===0?'out':'play'}>{gp.done}/{gp.total}</Badge>
        <div style={{flex:1,marginLeft:12,maxWidth:220}}>
          <Prog value={gp.done} total={gp.total} height={4} color={gp.done===0?'var(--out-500)':gp.done===gp.total?'var(--safe-500)':'var(--play-500)'}/>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {g.items.map((it,ii)=>{
          const sc=it.severity==='critical'?'var(--out-500)':it.severity==='warning'?'var(--play-500)':null;
          const docMap={'Annual rental registration':'pay-quit','Lead-based paint disclosure':'lead-paint','lead-based paint disclosure':'lead-paint','Pay or Quit':'pay-quit'};
          const relatedDoc=Object.entries(docMap).find(([k])=>it.title.toLowerCase().includes(k.toLowerCase()))?.[1];
          const isAnnual=/annual|registration|certificate/i.test(it.title);
          const key=`${gi}-${ii}`;
          const expanded=expandedItem===key;

          const handleToggle=()=>{
            const nowDone=!it.done;
            dispatch({type:'TOGGLE_COMP',propertyId,gi,ii});
            if(nowDone&&isAnnual&&onAddEvent){
              const nextYear=new Date().getFullYear()+1;
              const suggestDate=`${nextYear}-04-15`;
              if(window.confirm(`Mark as done. Add a reminder for next year?\n\n"${it.title}" — ${suggestDate}`)){
                onAddEvent({label:`${it.title} — renew`,date:suggestDate,tag:'compliance',tone:'warning'});
              }
            }
          };

          const steps=getActionSteps(it);

          return <div key={ii} style={{
            background:'var(--surface-1)',border:'1px solid var(--line-1)',
            borderLeft:sc&&!it.done?`3px solid ${sc}`:'1px solid var(--line-1)',
            borderRadius:'var(--r-2)',overflow:'hidden',
            opacity:it.done?0.7:1,transition:'opacity 200ms',
          }}>
            {/* Header row — always visible */}
            <div style={{display:'grid',gridTemplateColumns:'24px 1fr auto',gap:12,alignItems:'center',
              padding:'14px 18px',cursor:'pointer'}}
              onClick={()=>setExpandedItem(expanded?null:key)}>
              <div onClick={e=>{e.stopPropagation();handleToggle();}}>
                <Chk checked={it.done} onChange={()=>{}}/>
              </div>
              <div style={{minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:'var(--fg-1)',
                  textDecoration:it.done?'line-through':'none',lineHeight:1.3}}>{it.title}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:5,flexWrap:'wrap'}}>
                  <Badge tone={/Federal/.test(g.juris)?'info':/Indiana/.test(g.juris)?'brand':'play'}>{g.juris}</Badge>
                  <span style={{fontSize:11,color:'var(--fg-3)',letterSpacing:'0.04em',textTransform:'uppercase'}}>{it.due}</span>
                  {it.handledInLease&&<Badge tone="safe" subtle>Included in lease</Badge>}
                  {sc&&!it.done&&!it.handledInLease&&<Badge tone={it.severity==='critical'?'out':'play'}>{it.severity}</Badge>}
                </div>
              </div>
              <i data-lucide={expanded?'chevron-up':'chevron-down'}
                style={{width:15,height:15,color:'var(--fg-3)',flexShrink:0}}/>
            </div>

            {/* Expanded detail panel */}
            {expanded&&<div style={{borderTop:'1px solid var(--line-1)',padding:'18px 20px 20px',
              background:'var(--surface-0)',display:'flex',flexDirection:'column',gap:16}}>

              {/* Description */}
              {it.desc&&<div>
                <Eyebrow style={{marginBottom:8}}>What this requires</Eyebrow>
                <p style={{fontSize:13,color:'var(--fg-1)',lineHeight:1.6,margin:0}}>{it.desc}</p>

const ILLEGAL_PATTERNS = [
  { pattern:/waive.*right.*habitable|waive.*habitability/i, msg:"Tenants cannot waive the right to a habitable unit under Indiana law (IC § 32-31-8)." },
  { pattern:/waive.*security deposit|forfeit.*deposit.*automatically/i, msg:"Landlords cannot require tenants to waive security deposit rights (IC § 32-31-3)." },
  { pattern:/self.help eviction|remove.*belongings.*without.*court|lock.?out/i, msg:"Self-help eviction (lockouts, removing belongings) is illegal in Indiana. Court proceedings are required." },
  { pattern:/waive.*notice|no notice.*entry|enter.*without.*notice/i, msg:"Landlords must give 48 hours notice before entry except in emergencies (IC § 32-31-5-6)." },
  { pattern:/waive.*jury trial|waive.*court/i, msg:"Tenants cannot waive the right to court proceedings for eviction." },
  { pattern:/increase.*rent.*during.*lease term/i, msg:"Rent cannot be increased during a fixed-term lease without tenant consent." },
  { pattern:/late fee.{0,30}(\$[2-9]\d\d|\$[1-9]\d{3})/i, msg:"Late fees should be reasonable. Excessive late fees may be unenforceable in Indiana." },
  { pattern:/waive.*discrimination|waive.*fair housing/i, msg:"Fair Housing Act protections cannot be waived (42 U.S.C. § 3604)." },
];

function checkClause(text) {
  return ILLEGAL_PATTERNS.filter(p=>p.pattern.test(text)).map(p=>p.msg);
}

            {customClauses.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 4px',

      {/* ── RIGHT: Live lease preview ── */}

          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <i data-lucide="file-text" style={{width:14,height:14,color:'var(--fg-2)'}}/>
            <span style={{fontSize:13,fontWeight:600,color:'var(--fg-1)'}}>Live preview</span>
          </div>
          <span style={{fontSize:11,color:'var(--fg-4)'}}>Updates as you edit</span>
        </div>
        <div id="lease-preview" style={{background:'var(--cream-50)',color:'#1a1a1a',
          padding:'56px 64px',fontFamily:'Georgia,serif',fontSize:13,lineHeight:1.7,minHeight:600}}>

          {/* Title */}
          <div style={{textAlign:'center',marginBottom:32}}>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:'0.04em',marginBottom:4}}>RESIDENTIAL LEASE AGREEMENT</div>
            <div style={{fontSize:13,fontStyle:'italic',color:'#555'}}>State of Indiana</div>
            <div style={{fontSize:11,color:'#888',marginTop:6}}>Generated {today} · HomeRun by ISG LLC</div>
          </div>

          {/* Section 1 — Parties */}
          <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
            borderBottom:'1px solid #999',paddingBottom:4,marginBottom:14,marginTop:24}}>
            1. Parties & Premises
          </div>
          {[
            {k:'Landlord / Owner',v:fields.landlord},
            {k:'Tenant(s)',v:fields.tenant||'________________'},
            {k:'Premises',v:fields.address||'________________'},
            {k:'Lease type',v:fields.leaseType},
            {k:'Lease commencement',v:fields.startDate||'________________'},
            {k:'Lease termination',v:fields.endDate||'________________'},
            ...(isS8?[
              {k:'Monthly rent',v:fields.rent?`$${fields.rent}.00`:'$____'},
              {k:'HAP (housing authority)',v:fields.hapAmount?`$${fields.hapAmount}.00 per month`:'$____ per month'},
              {k:'Tenant rent share',v:fields.tenantShare?`$${fields.tenantShare}.00 per month`:'$____ per month'},
            ]:[
              {k:'Monthly rent',v:fields.rent?`$${fields.rent}.00`:'$____'},
              {k:'Rent due date',v:`${fields.dueDay||'1st'} day of each month`},
              {k:'Security deposit',v:fields.deposit?`$${fields.deposit}.00`:'$____'},
            ]),
          ].map((r,i)=><div key={i} style={{display:'flex',gap:12,marginBottom:5,fontSize:13}}>
            <span style={{fontWeight:600,minWidth:200,color:'#1a1a1a'}}>{r.k}:</span>
            <span style={{color:'#1F3C39',fontWeight:600}}>{r.v}</span>
          </div>)}

          {/* Section 2 — Required clauses */}
          <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
            borderBottom:'1px solid #999',paddingBottom:4,marginBottom:14,marginTop:28}}>
            2. Required Provisions — Indiana Law
          </div>
          {[...REQUIRED_CLAUSES,
            ...(isS8?[REQUIRED_CLAUSE_S8]:[]),
            ...(isPre1978?[REQUIRED_CLAUSE_PRE1978]:[]),
            ...(isHammond?[REQUIRED_CLAUSE_TBOR]:[]),
          ].map((c,i)=><div key={c.id} style={{marginBottom:18}}>
            <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:700}}>{String.fromCharCode(65+i)}. {c.title}</span>
              <span style={{fontSize:10,color:'#666',fontStyle:'italic'}}>{c.citation}</span>
            </div>
            <p style={{margin:0,fontSize:13,lineHeight:1.7,color:'#1a1a1a'}}>{c.text}</p>
          </div>)}

          {/* Section 3 — Optional clauses */}
          {OPTIONAL_CLAUSES.filter(c=>optEnabled[c.id]).length>0&&<>
            <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
              borderBottom:'1px solid #999',paddingBottom:4,marginBottom:14,marginTop:28}}>
              3. Additional Terms
            </div>
            {OPTIONAL_CLAUSES.filter(c=>optEnabled[c.id]).map((c,i)=><div key={c.id} style={{marginBottom:18}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>{String.fromCharCode(65+i)}. {c.title}</div>
              <p style={{margin:0,fontSize:13,lineHeight:1.7,color:'#1a1a1a'}}>{renderWithBlanks(optText[c.id])}</p>
            </div>)}
          </>}

          {/* Section 4 — Custom clauses */}
          {customClauses.length>0&&<>
            <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
              borderBottom:'1px solid #999',paddingBottom:4,marginBottom:14,marginTop:28}}>
              {OPTIONAL_CLAUSES.filter(c=>optEnabled[c.id]).length>0?'4':'3'}. Custom Provisions
            </div>
            {customClauses.map((c,i)=><div key={c.id} style={{marginBottom:18}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>{String.fromCharCode(65+i)}. {c.title}</div>
              <p style={{margin:0,fontSize:13,lineHeight:1.7,color:'#1a1a1a'}}>{c.text}</p>
              {c.warnings?.length>0&&c.warnings.map((w,wi)=><div key={wi} style={{fontSize:11,color:'#c0392b',
                background:'#fdecea',padding:'6px 8px',borderRadius:4,marginTop:4}}>⚠ {w}</div>)}
            </div>)}
          </>}

          {/* Signatures */}
          <div style={{marginTop:48,borderTop:'2px solid #1a1a1a',paddingTop:32}}>
            <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:24}}>
              Signatures
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:40}}>
              {[
                {role:'Landlord',name:'Stephanie Hart / ISG LLC'},
                {role:'Tenant',name:unit?.tenant||'________________'},
              ].map((s,i)=><div key={i}>
                <div style={{borderBottom:'1px solid #1a1a1a',marginBottom:6,paddingBottom:28}}/>
                <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{s.role} Signature</div>
                <div style={{fontSize:12,color:'#555'}}>{s.name}</div>
                <div style={{fontSize:11,color:'#888',marginTop:8}}>Date: ________________</div>
              </div>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>;
};

const DocContent = ({docId,unit,prop}) => {
  if(docId==='lead-paint')return <>
    <div style={dH}>DISCLOSURE OF INFORMATION ON LEAD-BASED PAINT</div>
    <div style={dS}>Title X, Section 1018 · 42 U.S.C. § 4852(d)</div>
    <div style={{marginBottom:22}}><div style={d3}>Property information</div>
      <div style={dKV}><span style={dK}>Property address:</span><span style={dHi}>{prop?.address} · {unit?.label}</span></div>
      <div style={dKV}><span style={dK}>Year of construction:</span><span style={dHi}>{prop?.yearBuilt} (pre-1978 — this disclosure is required)</span></div>
    </div>
    <div style={{marginBottom:22}}><div style={d3}>Landlord's disclosure</div>
      <div style={{fontSize:13,marginBottom:6}}>☐ Known lead-based paint hazards are present. Explanation: _________________________</div>
      <div style={{fontSize:13}}>☐ Landlord has no knowledge of lead-based paint hazards in the housing.</div>
    </div>
    <div style={sR}><div style={sB}>Landlord signature & date</div><div style={sB}>Tenant: {unit?.tenant}</div></div>
  </>;
  if(docId==='pay-quit')return <>
    <div style={dH}>NOTICE TO PAY RENT OR QUIT</div>
    <div style={dS}>Indiana Code 32-31-1-6 · Ten-day notice</div>
    <div style={dKV}><span style={dK}>To:</span><span style={dHi}>{unit?.tenant}</span></div>
    <div style={dKV}><span style={dK}>Premises:</span><span>{prop?.address} · {unit?.label}</span></div>
    <div style={dKV}><span style={dK}>Amount due:</span><span style={{...dHi,color:'#E07A5F'}}>${unit?.tenantShare||unit?.rent}</span></div>
    <div style={dKV}><span style={dK}>Period:</span><span>April 2026 rent ({unit?.lease==='Section 8'?'tenant share':'full'})</span></div>
    <p style={{fontSize:13,lineHeight:1.55,marginTop:16}}>You are hereby notified that rent is past due and unpaid on the above-described premises. You are required to pay the same in full within <strong>ten (10) days</strong> from service of this notice, or to surrender possession of the premises.</p>
    <div style={sR}><div style={sB}>Landlord signature & date</div><div style={sB}>Served on (date / method)</div></div>
  </>;
  if(docId==='lease')return <>
    <div style={dH}>RESIDENTIAL LEASE AGREEMENT</div><div style={dS}>State of Indiana</div>
    <div style={{marginBottom:22}}><div style={d3}>Parties & premises</div>
      <div style={dKV}><span style={dK}>Landlord:</span><span>Stephanie Hart / ISG LLC</span></div>
      <div style={dKV}><span style={dK}>Tenant(s):</span><span style={dHi}>{unit?.tenant||'________________'}</span></div>
      <div style={dKV}><span style={dK}>Premises:</span><span style={dHi}>{prop?.address} · {unit?.label}</span></div>
    </div>
    <div style={{marginBottom:22}}><div style={d3}>Term & rent</div>
      <div style={dKV}><span style={dK}>Lease type:</span><span>{unit?.lease||'1-year'}</span></div>
      <div style={dKV}><span style={dK}>Monthly rent:</span><span style={dHi}>${unit?.rent}.00</span></div>
      <div style={dKV}><span style={dK}>Due:</span><span>1st of each month</span></div>
      <div style={dKV}><span style={dK}>Security deposit:</span><span>${unit?.rent}.00</span></div>
    </div>
    <div style={sR}><div style={sB}>Landlord signature & date</div><div style={sB}>Tenant signature & date</div></div>
  </>;
  if(docId==='hap-rta')return <>

// preUnit: if opened from a vacant unit card, pre-selects that unit
const AddTenantModal = ({open,onClose,store,propertyId,dispatch,preUnit,onGoDoc}) => {
  const allUnits=store.tenants.filter(u=>u.property===propertyId);
  const vacantUnits=allUnits.filter(u=>u.status==='vacant');

  const [step,setStep]=useState(1);
  // Step 1 — unit selection
  const [unitId,setUnitId]=useState('');
  // Step 2 — tenant info
  const [name,setName]=useState('');
  const [lease,setLease]=useState('1-year');
  const [moveIn,setMoveIn]=useState('2026-06-01');
  const [leaseEnd,setLeaseEnd]=useState('2027-05-31');
  const [rent,setRent]=useState('');
  const [isS8,setIsS8]=useState(false);
  const [hapRent,setHapRent]=useState('');
  const [tenantShare,setTenantShare]=useState('');
  // Step 3 — confirm

  useEffect(()=>{
    if(open){
      setStep(preUnit?2:1);
      setUnitId(preUnit?.id||'');
      setRent(preUnit?String(preUnit.rent):'');
      setName('');setLease('1-year');setMoveIn('2026-06-01');setLeaseEnd('2027-05-31');
      setIsS8(false);setHapRent('');setTenantShare('');
    }
  },[open,preUnit]);

  // Sync rent when unit selected in step 1
  useEffect(()=>{
    const u=allUnits.find(x=>x.id===unitId);
    if(u) setRent(String(u.rent||''));
  },[unitId]);

  const selectedUnit=allUnits.find(u=>u.id===unitId)||preUnit;
  const initials=(n)=>n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);

  const save=()=>{
    if(!name.trim()||!unitId&&!preUnit)return;
    const uid=unitId||(preUnit?.id);
    const updated={
      ...allUnits.find(u=>u.id===uid),
      tenant:name.trim(),
      initials:initials(name),
      lease,moveIn,leaseEnd,
      rent:parseFloat(rent)||0,
      hapRent:isS8?parseFloat(hapRent)||0:null,
      tenantShare:isS8?parseFloat(tenantShare)||0:null,
      status:'occupied',
      vacantSince:undefined,listedOn:undefined,
    };
    dispatch({type:'ADD_TENANT',tenant:updated});
    onClose();
  };

  const totalSteps=3;
  const canNext=(()=>{
    if(step===1)return!!(unitId||preUnit);
    if(step===2)return name.trim().length>0&&(parseFloat(rent)||0)>0;
    return true;
  })();

  const saveAndGenerateLease=()=>{
    save();
    const uid=unitId||(preUnit?.id);
    if(onGoDoc&&uid) setTimeout(()=>onGoDoc('lease',uid),80);
  };

  const leaseOptions=['Month-to-month','6-month','1-year','2-year'];

  return <Modal open={open} onClose={onClose} title={null} width={540}
    footer={<>
      {step>1&&!preUnit&&<Btn variant="ghost" icon="arrow-left" onClick={()=>setStep(s=>s-1)}>Back</Btn>}
      {step>1&&preUnit&&<Btn variant="ghost" onClick={onClose}>Cancel</Btn>}
      <div style={{flex:1}}/>
      {step<totalSteps
        ?<Btn variant="primary" iconRight="arrow-right" onClick={()=>canNext&&setStep(s=>s+1)} style={{opacity:canNext?1:0.4}}>Continue</Btn>
        :<div style={{display:'flex',gap:8}}>
          <Btn variant="outline" icon="file-text" onClick={saveAndGenerateLease}>Save & generate lease</Btn>
          <Btn variant="primary" icon="user-plus" onClick={save}>Add tenant</Btn>
        </div>}
    </>}>

    {/* Progress */}
    <div style={{marginBottom:24}}>
      <Prog value={step} total={totalSteps} height={3}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
        <Eyebrow>Step {step} of {totalSteps}</Eyebrow>
        <div style={{display:'flex',gap:6}}>{[...Array(totalSteps)].map((_,i)=><Dia key={i} color={i<step?'var(--accent)':'var(--line-2)'} size={6}/>)}</div>
      </div>
    </div>

    {step===1&&<>
      <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,lineHeight:1.1,margin:0}}>Which unit?</h2>
      <p className="meta" style={{marginTop:8,marginBottom:20,fontSize:13}}>Select a vacant unit to place this tenant in, or add to any existing unit.</p>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {allUnits.map(u=>{
          const sel=unitId===u.id;
          const isVacant=u.status==='vacant';
          return <button key={u.id} onClick={()=>setUnitId(u.id)} style={{
            display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
            background:sel?'var(--surface-2)':'var(--surface-1)',
            border:`1px solid ${sel?'var(--accent)':'var(--line-1)'}`,
            boxShadow:sel?'0 0 0 3px rgba(94,234,212,0.10)':'none',
            borderRadius:'var(--r-2)',cursor:'pointer',textAlign:'left',fontFamily:'Geist,sans-serif',
            transition:'all 120ms',
          }}>
            <Dia color={isVacant?'var(--fg-4)':u.status==='late'?'var(--out-500)':'var(--safe-500)'} size={9}/>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:'var(--fg-1)'}}>{u.label}</div>
              <div style={{fontSize:12,color:'var(--fg-3)',marginTop:2}}>
                {isVacant?`Vacant · Asking ${fmt(u.rent)}/mo`:`${u.tenant} · ${u.lease} · ${fmt(u.rent)}/mo`}
              </div>
            </div>
            {isVacant&&<Badge tone="neutral">Vacant</Badge>}
            {sel&&<i data-lucide="check" style={{width:16,height:16,color:'var(--accent)'}}/>}
          </button>;
        })}
      </div>
    </>}

    {step===2&&<>
      <h2 style={{fontFamily:'Instrument Serif,serif',fontSize:30,lineHeight:1.1,margin:0}}>Tenant details.</h2>
      <p className="meta" style={{marginTop:8,marginBottom:20,fontSize:13}}>
        Placing in <strong style={{color:'var(--fg-1)'}}>{selectedUnit?.label||'unit'}</strong>. You can edit any of this later.
      </p>
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <Field label="Full name" required>
          <Inp value={name} onChange={setName} placeholder="First Last"/>
        </Field>

// ── ADD UNIT MODAL ────────────────────────────────────────────────────────────
const AddUnitModal = ({open,onClose,store,propertyId,dispatch}) => {
  const prop=store.properties.find(p=>p.id===propertyId);
  const existingUnits=store.tenants.filter(u=>u.property===propertyId);
  const nextNum=existingUnits.length+1;

  const [label,setLabel]=useState('');
  const [rent,setRent]=useState('');
  const [beds,setBeds]=useState('2');
  const [baths,setBaths]=useState('1');
  const [sqft,setSqft]=useState('');
  const [notes,setNotes]=useState('');

  useEffect(()=>{
    if(open){
      setLabel(`Unit ${nextNum}`);
      setRent('');setBeds('2');setBaths('1');setSqft('');setNotes('');
    }
  },[open]);

  const save=()=>{
    if(!label.trim()||(parseFloat(rent)||0)===0)return;
    const newUnit={
      id:`${propertyId}-u${Date.now()}`,
      property:propertyId,
      label:label.trim(),
      tenant:null,initials:null,
      rent:parseFloat(rent)||0,
      hapRent:null,tenantShare:null,
      lease:null,leaseEnd:null,
      status:'vacant',
      vacantSince:new Date().toISOString().slice(0,10),
      listedOn:'—',
      beds:parseInt(beds)||2,
      baths:parseFloat(baths)||1,
      sqft:parseInt(sqft)||null,
      notes:notes.trim()||null,
    };
    dispatch({type:'ADD_UNIT',unit:newUnit});
    onClose();
  };

  const canSave=label.trim().length>0&&(parseFloat(rent)||0)>0;

  return <Modal open={open} onClose={onClose} title="Add unit"
    subtitle={`Adding to ${prop?.name||'property'}`}
    footer={<>
      <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      <Btn variant="primary" icon="door-open" onClick={save} style={{opacity:canSave?1:0.4}}>Add unit</Btn>
    </>}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Field label="Unit label" required hint='e.g. "Unit 5" or "2B"'>
          <Inp value={label} onChange={setLabel} placeholder="Unit 5"/>
        </Field>
        <Field label="Asking rent" required>
          <Inp value={rent} onChange={setRent} type="number" prefix="$"/>
        </Field>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
        <Field label="Bedrooms">
          <Sel value={beds} onChange={setBeds} options={['Studio','1','2','3','4','5+']}/>
        </Field>
        <Field label="Bathrooms">
          <Sel value={baths} onChange={setBaths} options={['1','1.5','2','2.5','3']}/>
        </Field>
        <Field label="Sq ft" optional>
          <Inp value={sqft} onChange={setSqft} type="number" placeholder="850"/>
        </Field>
      </div>
      <Field label="Notes" optional hint="Internal note — not tenant-facing.">
        <Inp value={notes} onChange={setNotes} placeholder="e.g. Ground floor, garden access"/>
      </Field>

      {/* Preview card */}
      <div style={{marginTop:4,padding:'14px 18px',background:'var(--surface-0)',borderRadius:'var(--r-2)',border:'1px solid var(--line-1)'}}>
        <Eyebrow style={{marginBottom:10}}>Preview</Eyebrow>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <Dia color="var(--fg-4)" size={8}/>
            <span style={{fontSize:14,fontWeight:600,color:'var(--fg-1)'}}>{label||'Unit ?'}</span>
            <Badge tone="neutral">Vacant</Badge>
          </div>
          <span className="mono" style={{fontSize:14,color:'var(--fg-1)'}}>{rent?fmt(parseFloat(rent)):fmt(0)}/mo</span>
        </div>
        <div style={{fontSize:12,color:'var(--fg-3)',marginTop:6}}>
          {beds==='Studio'?'Studio':beds+' bed'} · {baths} bath{baths!=='1'?'s':''}{sqft?` · ${sqft} sq ft`:''}
          {' · '}{prop?.address}

      </div>
    </div>
  </Modal>;
};

  const [phone,setPhone]=useState('');
  const [email,setEmail]=useState('');
  const [emergencyName,setEmergencyName]=useState('');
  const [emergencyPhone,setEmergencyPhone]=useState('');

    if(open&&tenant){

          </div>

const AddEventModal = ({open,onClose,dispatch,prefill}) => {
  const [label,setLabel]=useState('');
  const [date,setDate]=useState('');
  const [tag,setTag]=useState('compliance');
  const [tone,setTone]=useState('warning');

  useEffect(()=>{
    if(open){
      setLabel(prefill?.label||'');
      setDate(prefill?.date||new Date().toISOString().slice(0,10));
      setTag(prefill?.tag||'compliance');
      setTone(prefill?.tone||'warning');
    }
  },[open,prefill]);

  const save=()=>{
    if(!label.trim()||!date)return;
    dispatch({type:'ADD_SCHED',task:{id:'s-'+Date.now(),label:label.trim(),date,tag,tone}});
    onClose();
  };

  const tagOptions=[{value:'compliance',label:'Compliance'},{value:'rent',label:'Rent'},{value:'repair',label:'Repair'},{value:'recurring',label:'Recurring'},{value:'inspection',label:'Inspection'},{value:'other',label:'Other'}];
  const toneOptions=[{value:'critical',label:'Critical (red)'},{value:'warning',label:'Warning (gold)'},{value:'info',label:'Info (teal)'}];
  const canSave=label.trim().length>0&&date.length>0;

  return <Modal open={open} onClose={onClose} title="Add event" subtitle="Appears on your Schedule and can trigger dashboard reminders."

      <Field label="Event" required>
        <Inp value={label} onChange={setLabel} placeholder="e.g. Hammond registration — renew"/>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Field label="Date" required>
          <Inp value={date} onChange={setDate} type="date"/>
        </Field>
        <Field label="Tag">
          <Sel value={tag} onChange={setTag} options={tagOptions}/>
        </Field>
      </div>
      <Field label="Priority">
        <Sel value={tone} onChange={setTone} options={toneOptions}/>
      </Field>
    </div>
  </Modal>;
};

    if(!tenant)return;
    // End tenancy
    dispatch({type:'EDIT_TENANT',tenant:{
      ...tenant,tenant:null,initials:null,lease:null,leaseEnd:null,
      status:'vacant',vacantSince:moveOutDate,listedOn:'—',

    onClose();

  return <Modal open={open} onClose={onClose} title="End tenancy" subtitle={`${tenant.tenant} · ${tenant.label}`} width={500}

        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:10}}>
          {[
            {k:'Move-out date',v:moveOutDate},
            {k:'Return deadline',v:deadline},
            {k:'Deposit held',v:fmt(depositAmt)},
            {k:'IC § 32-31-3-12',v:'45-day rule',mono:false},
          ].map((r,i)=><div key={i}>

// ── SEARCH MODAL ──────────────────────────────────────────────────────────────
const SEARCH_ICONS={tenant:'users',unit:'door-open',payment:'wallet-minimal',expense:'receipt',repair:'wrench',doc:'file-text',compliance:'shield',property:'building'};
const SEARCH_TONES={tenant:'brand',unit:'safe',payment:'safe',expense:'out',repair:'play',doc:'info',compliance:'play',property:'neutral'};

function buildIndex(store) {
  const results=[];
  store.tenants.filter(u=>u.tenant).forEach(u=>{
    const prop=store.properties.find(p=>p.id===u.property);
    results.push({type:'tenant',id:u.id,title:u.tenant,
      sub:`${u.label} · ${prop?.name} · ${u.lease} · ${fmt(u.rent)}/mo`,
      keywords:`${u.tenant} ${u.label} ${u.lease} ${u.status}`.toLowerCase(),
      nav:'tenants',propId:u.property});
  });
  store.tenants.forEach(u=>{
    const prop=store.properties.find(p=>p.id===u.property);
    results.push({type:'unit',id:u.id+'-unit',title:u.label,
      sub:`${prop?.name} · ${u.status==='vacant'?'Vacant — asking '+fmt(u.rent):u.tenant+' · '+fmt(u.rent)+'/mo'}`,
      keywords:`${u.label} ${u.status} ${u.tenant||''} ${prop?.name}`.toLowerCase(),
      nav:'units',propId:u.property});
  });
  store.payments.forEach(p=>{
    results.push({type:'payment',id:p.id,title:`${p.id} — ${p.tenant}`,
      sub:`${p.unit} · ${p.period} · ${fmt(p.amount)} · ${p.status}`,
      keywords:`${p.tenant} ${p.unit} ${p.period} ${p.method} ${p.status} ${p.id}`.toLowerCase(),
      nav:'payments',propId:p.property});
  });
  store.expenses.forEach(e=>{
    results.push({type:'expense',id:e.id,title:e.desc,
      sub:`${e.vendor} · ${e.cat} · ${fmt(e.amount)} · ${e.date}`,
      keywords:`${e.desc} ${e.vendor} ${e.cat} ${e.unit} ${e.id}`.toLowerCase(),
      nav:'expenses',propId:e.property});
  });
  store.repairs.forEach(r=>{
    results.push({type:'repair',id:r.id,title:r.title,
      sub:`${r.unit} · ${r.status} · ${r.priority} priority${r.vendor?' · '+r.vendor:''}`,
      keywords:`${r.title} ${r.unit} ${r.status} ${r.priority} ${r.vendor||''} ${r.id}`.toLowerCase(),
      nav:'repairs',propId:r.property});
  });
  [{id:'pay-quit',name:'Pay or Quit notice',kw:'pay quit eviction non-payment indiana'},
   {id:'lead-paint',name:'Lead paint disclosure',kw:'lead paint pre-1978 federal title x'},
   {id:'lease',name:'Lease agreement',kw:'lease agreement indiana residential'},
   {id:'hap-rta',name:'HAP / RTA packet',kw:'hap rta section 8 hcv voucher'},
   {id:'move-in',name:'Move-in inspection',kw:'move in inspection checklist nspire'},
   {id:'rent-receipt',name:'Rent receipt',kw:'rent receipt payment'}
  ].forEach(d=>{
    results.push({type:'doc',id:'doc-'+d.id,title:d.name,
      sub:'Documents · Generate & download',keywords:d.kw,
      nav:'documents',docId:d.id});
  });
  Object.entries(store.compliance).forEach(([propId,groups])=>{
    const prop=store.properties.find(p=>p.id===propId);
    groups.forEach(g=>g.items.forEach((it,ii)=>{
      results.push({type:'compliance',id:`c-${propId}-${ii}`,title:it.title,
        sub:`${g.juris} · ${prop?.name} · ${it.done?'✓ Done':'Pending'}`,
        keywords:`${it.title} ${g.juris} ${it.desc||''} compliance`.toLowerCase(),
        nav:'local-laws',propId});
    }));
  });
  store.properties.forEach(p=>{
    results.push({type:'property',id:'prop-'+p.id,title:p.name,
      sub:`${p.address} · ${p.units} units`,
      keywords:`${p.name} ${p.address} ${p.city}`.toLowerCase(),
      nav:'portfolio',propId:p.id});
  });
  return results;
}

const SearchModal = ({open,onClose,store,onNavigate,onSetProp,onGoDoc}) => {
  const [q,setQ]=useState('');
  const [sel,setSel]=useState(0);
  const inputRef=useRef(null);
  const index=buildIndex(store);
  useEffect(()=>{if(open){setQ('');setSel(0);setTimeout(()=>inputRef.current?.focus(),60);};},[open]);

  const results=q.trim().length<1
    ?index.slice(0,8)
    :index.filter(r=>r.keywords.includes(q.toLowerCase())||r.title.toLowerCase().includes(q.toLowerCase())).slice(0,12);

  const go=(r)=>{
    if(r.propId)onSetProp&&onSetProp(r.propId);
    if(r.type==='doc'&&onGoDoc)onGoDoc(r.docId);
    else onNavigate&&onNavigate(r.nav);
    onClose();
  };
  const handleKey=(e)=>{
    if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,results.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==='Enter'&&results[sel])go(results[sel]);
    else if(e.key==='Escape')onClose();
  };
  if(!open)return null;

  const typeLabels={tenant:'Tenants',unit:'Units',payment:'Payments',expense:'Expenses',repair:'Repairs',doc:'Documents',compliance:'Compliance',property:'Properties'};
  const groupOrder=['tenant','unit','payment','expense','repair','doc','compliance','property'];
  const grouped=groupOrder.reduce((acc,t)=>{const g=results.filter(r=>r.type===t);if(g.length)acc.push({type:t,items:g});return acc;},[]);
  let gi=0;

  return <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200,
    background:'rgba(8,20,19,0.72)',display:'flex',alignItems:'flex-start',justifyContent:'center',
    padding:'80px 24px 24px',backdropFilter:'blur(4px)'}}>
    <div onClick={e=>e.stopPropagation()} onKeyDown={handleKey} style={{
      width:'100%',maxWidth:600,background:'var(--surface-3)',
      border:'1px solid var(--line-2)',borderRadius:'var(--r-3)',
      boxShadow:'var(--shadow-2)',overflow:'hidden',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',borderBottom:'1px solid var(--line-1)'}}>
        <i data-lucide="search" style={{width:18,height:18,color:'var(--fg-3)',flexShrink:0}}/>
        <input ref={inputRef} value={q} onChange={e=>{setQ(e.target.value);setSel(0);}}
          placeholder="Search tenants, payments, docs, compliance…"
          style={{flex:1,background:'transparent',border:'none',outline:'none',
            color:'var(--fg-1)',fontFamily:'Geist,sans-serif',fontSize:16}}/>
        {q&&<button onClick={()=>setQ('')} style={{background:'transparent',border:'none',color:'var(--fg-4)',cursor:'pointer',padding:2}}>
          <i data-lucide="x" style={{width:15,height:15}}/>
        </button>}
        <kbd style={{background:'var(--surface-2)',border:'1px solid var(--line-2)',borderRadius:4,
          padding:'2px 6px',fontSize:11,color:'var(--fg-3)',fontFamily:'Geist Mono,monospace'}}>ESC</kbd>
      </div>
      <div style={{overflow:'auto',maxHeight:460}}>
        {results.length===0&&q.trim()&&<div style={{padding:'28px 18px',textAlign:'center',fontSize:13,color:'var(--fg-3)'}}>No results for "{q}"</div>}
        {grouped.map(({type,items})=><div key={type}>
          <div style={{padding:'10px 18px 4px'}}><Eyebrow>{typeLabels[type]}</Eyebrow></div>
          {items.map(r=>{const idx=gi++;const active=sel===idx;return(
            <button key={r.id} onClick={()=>go(r)} onMouseEnter={()=>setSel(idx)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'10px 18px',
                background:active?'var(--surface-2)':'transparent',border:'none',cursor:'pointer',
                textAlign:'left',fontFamily:'Geist,sans-serif',transition:'background 80ms'}}>
              <div style={{width:32,height:32,borderRadius:'var(--r-1)',flexShrink:0,
                background:`var(--${SEARCH_TONES[type]}-tint)`,color:`var(--${SEARCH_TONES[type]}-500)`,
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <i data-lucide={SEARCH_ICONS[type]} style={{width:15,height:15}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,color:'var(--fg-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                <div style={{fontSize:11,color:'var(--fg-3)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.sub}</div>
              </div>
              {active&&<i data-lucide="arrow-right" style={{width:14,height:14,color:'var(--accent)',flexShrink:0}}/>}
            </button>);})}
        </div>)}
      </div>
      <div style={{padding:'10px 18px',borderTop:'1px solid var(--line-1)',display:'flex',gap:16,fontSize:11,color:'var(--fg-4)'}}>
        {[['↑↓','Navigate'],['↵','Open'],['ESC','Close']].map(([k,l])=><span key={k} style={{display:'flex',alignItems:'center',gap:5}}>
          <kbd style={{background:'var(--surface-2)',border:'1px solid var(--line-2)',borderRadius:3,padding:'1px 5px',fontFamily:'Geist Mono,monospace',fontSize:10}}>{k}</kbd>{l}
        </span>)}
        <span style={{marginLeft:'auto'}}>{results.length} result{results.length!==1?'s':''}</span>
      </div>
    </div>
  </div>;
};

// ── EDIT REPAIR MODAL ─────────────────────────────────────────────────────────
const EditRepairModal = ({open,onClose,repair,store,propertyId,dispatch}) => {
  const units=store.tenants.filter(u=>u.property===propertyId);
  const [title,setTitle]=useState('');
  const [unit,setUnit]=useState('');
  const [priority,setPriority]=useState('normal');
  const [status,setStatus]=useState('open');
  const [vendor,setVendor]=useState('');
  const [notes,setNotes]=useState('');
  const [opened,setOpened]=useState('');

  useEffect(()=>{
    if(open&&repair){
      setTitle(repair.title||'');
      setUnit(repair.unit||'Building');
      setPriority(repair.priority||'normal');
      setStatus(repair.status||'open');
      setVendor(repair.vendor||'');
      setNotes(repair.notes||'');
      setOpened(repair.opened||'');
    }
  },[open,repair]);

  const save=(overrideStatus)=>{
    if(!repair)return;
    const finalStatus=overrideStatus||status;
    dispatch({type:'EDIT_REPAIR',repair:{
      ...repair,title,unit,priority,
      status:finalStatus,
      vendor:vendor.trim()||null,
      notes:notes.trim(),
      opened,
      closed:finalStatus==='completed'?(repair.closed||new Date().toISOString().slice(0,10)):repair.closed||null,
    }});
    onClose();
  };

  const unitOptions=['Building',...units.map(u=>u.label)];
  const priorityColors={high:'var(--out-500)',normal:'var(--play-500)',low:'var(--fg-3)'};
  const statusTones={'open':'out','in-progress':'play','completed':'safe'};
  const isComplete=status==='completed';

  return <Modal open={open} onClose={onClose}
    title={`Repair — ${repair?.id||''}`}
    subtitle={repair?.title}
    footer={<>
      {!isComplete&&<Btn variant="primary" icon="check-circle" onClick={()=>save('completed')}
        style={{background:'var(--safe-500)',borderColor:'var(--safe-500)',color:'#fff'}}>
        Mark complete
      </Btn>}
      {isComplete&&<Badge tone="safe" style={{padding:'6px 12px',fontSize:12}}>✓ Completed {repair?.closed}</Badge>}
      <div style={{flex:1}}/>
      <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      <Btn variant="primary" icon="check" onClick={()=>save()}>Save changes</Btn>
    </>}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* Status strip */}
      <div style={{display:'flex',gap:8}}>
        {['open','in-progress','completed'].map(s=>{
          const active=status===s;
          const tone=statusTones[s];
          const labels={'open':'Open','in-progress':'In progress','completed':'Completed'};
          return <button key={s} onClick={()=>setStatus(s)} style={{
            flex:1,padding:'8px 0',borderRadius:'var(--r-1)',cursor:'pointer',
            fontFamily:'Geist,sans-serif',fontSize:12,fontWeight:500,
            background:active?`var(--${tone}-tint)`:'var(--surface-2)',
            border:`1px solid ${active?`var(--${tone}-500)`:'var(--line-2)'}`,
            color:active?`var(--${tone}-500)`:'var(--fg-3)',
            transition:'all 120ms',
          }}>{labels[s]}</button>;
        })}
      </div>

      <Field label="Issue" required>
        <Inp value={title} onChange={setTitle} placeholder="e.g. Kitchen faucet leaking"/>
      </Field>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Field label="Unit">
          <Sel value={unit} onChange={setUnit} options={unitOptions}/>
        </Field>
        <Field label="Priority">
          <Sel value={priority} onChange={setPriority}
            options={[{value:'high',label:'High'},{value:'normal',label:'Normal'},{value:'low',label:'Low'}]}/>
        </Field>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Field label="Vendor" optional hint="Who is doing the work?">
          <Inp value={vendor} onChange={setVendor} placeholder="e.g. Ace Plumbing"/>
        </Field>
        <Field label="Date opened">
          <Inp value={opened} onChange={setOpened} type="date"/>
        </Field>
      </div>

      <Field label="Notes" optional hint="Visible to you only — log updates, parts needed, quotes, etc.">
        <div style={{position:'relative'}}>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="e.g. Tony's HVAC quoted $380 for compressor replacement. Parts ETA May 20."
            rows={4} style={{
              width:'100%',background:'var(--surface-2)',border:'1px solid var(--line-2)',
              borderRadius:'var(--r-1)',padding:'9px 12px',color:'var(--fg-1)',
              fontFamily:'Geist,sans-serif',fontSize:14,lineHeight:1.5,resize:'vertical',
              outline:'none',boxSizing:'border-box',
            }}/>
        </div>
      </Field>

      {/* Priority indicator */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
        background:'var(--surface-0)',borderRadius:'var(--r-1)',border:'1px solid var(--line-1)'}}>
        <Dia color={priorityColors[priority]} size={8}/>
        <span style={{fontSize:12,color:'var(--fg-2)'}}>
          {priority==='high'?'High priority — surfaces as a warning alert on Dashboard'
            :priority==='normal'?'Normal priority — tracked in Repairs view'
            :'Low priority — tracked in Repairs, no dashboard alert'}
        </span>
      </div>
    </div>
  </Modal>;
};

// ── INVITE MODAL ──────────────────────────────────────────────────────────────
const InviteModal = ({open,onClose,unit,prop}) => {
  const [copied,setCopied]=useState(false);
  if(!open||!unit) return null;

  const appUrl = `${window.location.href.replace('homerun.html','tenant.html').replace(window.location.search,'')}?apply=${unit.id}&unit=${encodeURIComponent(unit.label)}&prop=${encodeURIComponent(prop?.name||'')}&rent=${unit.rent}`;

  const copy = () => {
    navigator.clipboard.writeText(appUrl).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2500);
    }).catch(()=>{
      // Fallback for file:// protocol
      const ta=document.createElement('textarea');
      ta.value=appUrl;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      setCopied(true);setTimeout(()=>setCopied(false),2500);
    });
  };

  return <Modal open={open} onClose={onClose} title="Invite applicant"
    subtitle={`${unit.label} · ${prop?.address} · ${fmt(unit.rent)}/mo`}
    footer={<><Btn variant="ghost" onClick={onClose}>Close</Btn></>}>
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{padding:'18px 20px',background:'var(--brand-faint)',borderRadius:'var(--r-2)',
        border:'1px solid rgba(42,139,130,0.2)'}}>
        <div style={{fontSize:13,color:'var(--fg-2)',marginBottom:12,lineHeight:1.5}}>
          Share this link with your applicant. They'll fill out the application form and it will appear in your queue automatically.
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>

// ── ACTION LIST VIEW ──────────────────────────────────────────────────────────
function buildActionItems(store, navigate, dispatch) {
  const today = new Date('2026-05-13');
  const items = [];

  store.properties.forEach(prop => {
    const units = store.tenants.filter(u => u.property === prop.id);

    // Late rent
    units.filter(u => u.status === 'late').forEach(u => {
      items.push({
        id: `late-${u.id}`, type:'rent', property:prop.id, sourceId:u.id,
        title: `Collect overdue rent — ${u.tenant}`,
        detail: `${u.label} · ${fmt(u.tenantShare||u.rent)} overdue${u.daysLate?' · '+u.daysLate+'d late':''}`,
        priority:'critical', done:false,
        action:{ label:'Record payment', modal:'pay' },
        altAction:{ label:'Pay or Quit', docId:'pay-quit', unitId:u.id },
      });
    });

    // Critical compliance
    const compGroups = store.compliance[prop.id] || [];
    compGroups.forEach(g => {
      g.items.filter(it => !it.done && it.severity === 'critical' && !it.handledInLease).forEach((it, ii) => {
        const gi = compGroups.indexOf(g);
        items.push({
          id: `comp-crit-${prop.id}-${gi}-${ii}`, type:'compliance', property:prop.id,
          sourceType:'compliance', sourceGi:gi, sourceIi:ii,
          title: it.title,
          detail: `${g.juris} · ${prop.name} · ${it.due}`,
          priority:'critical', done:it.done,
          action:{ label:'View compliance', nav:'local-laws' },
          citation: it.citation,
        });
      });
    });

    // Warning compliance
    compGroups.forEach(g => {
      g.items.filter(it => !it.done && it.severity === 'warning' && !it.handledInLease).forEach((it, ii) => {
        const gi = compGroups.indexOf(g);
        items.push({
          id: `comp-warn-${prop.id}-${gi}-${ii}`, type:'compliance', property:prop.id,
          sourceType:'compliance', sourceGi:gi, sourceIi:ii,
          title: it.title,
          detail: `${g.juris} · ${prop.name} · ${it.due}`,
          priority:'warning', done:it.done,
          action:{ label:'View compliance', nav:'local-laws' },
        });
      });
    });

    // Open high-priority repairs
    store.repairs.filter(r => r.property === prop.id && r.priority === 'high' && r.status !== 'completed').forEach(r => {
      items.push({
        id: `repair-${r.id}`, type:'repair', property:prop.id, sourceId:r.id,
        title: `Open repair — ${r.title}`,
        detail: `${r.unit} · ${prop.name} · Opened ${r.opened}${r.vendor?' · '+r.vendor:''}`,
        priority:'warning', done:false,
        action:{ label:'Manage repair', nav:'repairs' },
      });
    });

    // Lease expiring within 90 days
    units.filter(u => u.tenant && u.leaseEnd).forEach(u => {
      const daysLeft = Math.round((new Date(u.leaseEnd) - today) / (1000*60*60*24));
      if(daysLeft <= 90 && daysLeft > -30) {
        items.push({
          id: `lease-${u.id}`, type:'lease', property:prop.id, sourceId:u.id,
          title: `Lease ${daysLeft <= 0 ? 'expired' : 'expiring'} — ${u.tenant}`,
          detail: `${u.label} · ${prop.name} · ${daysLeft <= 0 ? 'Expired' : daysLeft+'d remaining'} · ${u.leaseEnd}`,
          priority: daysLeft <= 0 || daysLeft <= 30 ? 'critical' : daysLeft <= 60 ? 'warning' : 'info',
          done: false,
          action:{ label:'Generate lease', docId:'lease', unitId:u.id },
        });
      }
    });

    // Vacant units
    units.filter(u => u.status === 'vacant').forEach(u => {
      items.push({
        id: `vacant-${u.id}`, type:'vacancy', property:prop.id, sourceId:u.id,
        title: `Fill vacancy — ${u.label}`,
        detail: `${prop.name} · Vacant since ${u.vacantSince} · Asking ${fmt(u.rent)}/mo`,
        priority:'info', done:false,
        action:{ label:'Invite applicant', nav:'applications' },
      });
    });

    // Pending applications
    const pendingApps = (store.applications||[]).filter(a => a.property === prop.id && a.status === 'pending');
    if(pendingApps.length > 0) {
      items.push({
        id: `apps-${prop.id}`, type:'application', property:prop.id,
        title: `${pendingApps.length} pending application${pendingApps.length>1?'s':''}`,
        detail: `${prop.name} · Awaiting review`,
        priority:'info', done:false,
        action:{ label:'Review applications', nav:'applications' },
      });
    }

    // Upcoming schedule items (next 14 days)
    store.schedTasks.filter(t => {
      const diff = Math.round((new Date(t.date) - today) / (1000*60*60*24));
      return diff >= 0 && diff <= 14;
    }).forEach(t => {
      items.push({
        id: `sched-${t.id}`, type:'schedule', property:null,
        title: t.label,
        detail: `Due ${t.date} · ${t.tag}`,
        priority: t.tone === 'critical' ? 'critical' : t.tone === 'warning' ? 'warning' : 'info',
        done:false,
        action:{ label:'View schedule', nav:'schedule' },
      });
    });
  });

  return items;
}

const PRIORITY_ORDER = { critical:0, warning:1, info:2 };
const PRIORITY_COLOR = { critical:'var(--out-500)', warning:'var(--play-500)', info:'var(--teal-300)' };
const TYPE_ICON = { rent:'dollar-sign', compliance:'shield', repair:'wrench', lease:'calendar-clock',
  vacancy:'door-open', application:'clipboard-list', schedule:'calendar', custom:'check-square' };

// ── ACTION ITEM DETAIL PAGE ───────────────────────────────────────────────────
const ActionItemDetail = ({item,store,dispatch,onBack,onGoDoc,navigate,onOpenPay}) => {
  const custom = (store.customActions||[]).find(c=>c.id===item.id);
  const [note,setNote] = useState(custom?.note||item.note||'');
  const [dueDate,setDueDate] = useState(custom?.dueDate||item.dueDate||'');
  const [saved,setSaved] = useState(false);
  const steps = item.steps||[];
  const isCustom = item.type==='custom';
  const priorityColor = PRIORITY_COLOR[item.priority];
  const save = () => {
    if(isCustom) dispatch({type:'UPDATE_CUSTOM_ACTION', id:item.id, changes:{note,dueDate}});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };
  const remove = () => {
    if(isCustom) dispatch({type:'REMOVE_CUSTOM_ACTION', id:item.id});
    else dispatch({type:'DISMISS_ACTION', id:item.id});
